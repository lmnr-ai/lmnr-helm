# Example: All Secrets from HashiCorp Vault
# Fetches all application secrets from Vault KV store
# Ideal for on-premises or multi-cloud deployments
#
# Note: Auto-generated URLs (DATABASE_URL, RABBITMQ_URL) are NOT generated when their
# component credentials are in external stores. You MUST include these URLs in your
# Vault secret if you're fetching POSTGRES_USER, POSTGRES_PASSWORD, etc. from Vault.

secrets:
  enabled: true
  enableDatabaseSSL: false

  # AWS Secrets Manager - DISABLED
  awsSecretsManager:
    enabled: false

  # HashiCorp Vault configuration
  vault:
    enabled: true
    address: "http://vault.default.svc.cluster.local:8200"

    # Kubernetes auth configuration
    authPath: "auth/kubernetes"
    role: "lmnr-app"

    # Service account for Vault authentication
    serviceAccount:
      create: true
      name: "lmnr-vault-sa"

    # Secret path configuration (KV v2)
    kvVersion: "v2"
    secretPath: "secret/data/lmnr" # For KV v2, path includes /data/

    # List ALL secrets to fetch from Vault
    secretKeys:
      - NEXTAUTH_SECRET
      - RABBITMQ_ERLANG_COOKIE
      - RABBITMQ_DEFAULT_USER
      - RABBITMQ_DEFAULT_PASS
      - CLICKHOUSE_USER
      - CLICKHOUSE_PASSWORD
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - AEAD_SECRET_KEY
      - SHARED_SECRET_TOKEN
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_REGION
      - S3_EXPORTS_BUCKET
      - PYTHON_ONLINE_EVALUATOR_URL
      - CLICKHOUSE_RO_USER
      - CLICKHOUSE_RO_PASSWORD
      - TRACE_SUMMARIZER_SECRET_KEY
      - TRACE_SUMMARIZER_URL
      - TRACE_EVENT_IDENTIFIER_URL
      - SLACK_ENCRYPTION_KEY
      - CLUSTER_ENDPOINT
      - CLUSTER_ENDPOINT_KEY
      - ONLINE_EVALUATORS_SECRET_KEY
      - AUTH_GITHUB_ID
      - AUTH_GITHUB_SECRET
      - AUTH_GOOGLE_ID
      - AUTH_GOOGLE_SECRET
      - AUTH_AZURE_AD_CLIENT_ID
      - AUTH_AZURE_AD_CLIENT_SECRET
      - AUTH_AZURE_AD_TENANT_ID
      - AUTH_OKTA_CLIENT_ID
      - AUTH_OKTA_CLIENT_SECRET
      - AUTH_OKTA_ISSUER
      - STRIPE_SECRET_KEY
      - STRIPE_WEBHOOK_ENDPOINT_SECRET
      - RESEND_API_KEY
      - GITHUB_TOKEN
      - LAMINAR_API_KEY
      - SUPABASE_JWT_SECRET
      - DATASET_EXPORT_WORKER_URL
      - DATASET_EXPORT_SECRET_KEY
      - DATA_EXPORTER_URL
      - DATA_EXPORTER_SECRET_KEY
      - SLACK_CLIENT_ID
      - SLACK_CLIENT_SECRET
      - SLACK_SIGNING_SECRET
      - SLACK_REDIRECT_URL
      - OPENAI_API_KEY
      - GOOGLE_GENERATIVE_AI_API_KEY
      - LMNR_PROJECT_API_KEY
      - QUICKWIT_DATABASE_URL
      # REQUIRED: Include these URLs since we're fetching credentials from Vault
      # The template skips auto-generation when credentials are in external stores
      - DATABASE_URL
      - RABBITMQ_URL

  # Placeholder values - not used since all secrets come from Vault
  data:
    NEXTAUTH_SECRET: ""
    RABBITMQ_ERLANG_COOKIE: ""
    RABBITMQ_DEFAULT_USER: ""
    RABBITMQ_DEFAULT_PASS: ""
    CLICKHOUSE_USER: ""
    CLICKHOUSE_PASSWORD: ""
    POSTGRES_USER: ""
    POSTGRES_PASSWORD: ""
    AEAD_SECRET_KEY: ""
    SHARED_SECRET_TOKEN: ""
    AWS_ACCESS_KEY_ID: ""
    AWS_SECRET_ACCESS_KEY: ""
    AWS_REGION: ""
    S3_EXPORTS_BUCKET: ""
    PYTHON_ONLINE_EVALUATOR_URL: ""
    CLICKHOUSE_RO_USER: ""
    CLICKHOUSE_RO_PASSWORD: ""
    TRACE_SUMMARIZER_SECRET_KEY: ""
    TRACE_SUMMARIZER_URL: ""
    TRACE_EVENT_IDENTIFIER_URL: ""
    SLACK_ENCRYPTION_KEY: ""
    CLUSTER_ENDPOINT: ""
    CLUSTER_ENDPOINT_KEY: ""
    ONLINE_EVALUATORS_SECRET_KEY: ""
    AUTH_GITHUB_ID: ""
    AUTH_GITHUB_SECRET: ""
    AUTH_GOOGLE_ID: ""
    AUTH_GOOGLE_SECRET: ""
    AUTH_AZURE_AD_CLIENT_ID: ""
    AUTH_AZURE_AD_CLIENT_SECRET: ""
    AUTH_AZURE_AD_TENANT_ID: ""
    AUTH_OKTA_CLIENT_ID: ""
    AUTH_OKTA_CLIENT_SECRET: ""
    AUTH_OKTA_ISSUER: ""
    STRIPE_SECRET_KEY: ""
    STRIPE_WEBHOOK_ENDPOINT_SECRET: ""
    RESEND_API_KEY: ""
    GITHUB_TOKEN: ""
    LAMINAR_API_KEY: ""
    SUPABASE_JWT_SECRET: ""
    DATASET_EXPORT_WORKER_URL: ""
    DATASET_EXPORT_SECRET_KEY: ""
    DATA_EXPORTER_URL: ""
    DATA_EXPORTER_SECRET_KEY: ""
    SLACK_CLIENT_ID: ""
    SLACK_CLIENT_SECRET: ""
    SLACK_SIGNING_SECRET: ""
    SLACK_REDIRECT_URL: ""
    OPENAI_API_KEY: ""
    GOOGLE_GENERATIVE_AI_API_KEY: ""
    LMNR_PROJECT_API_KEY: ""
    QUICKWIT_DATABASE_URL: ""

# Vault Setup Instructions:
#
# 1. Enable Kubernetes auth in Vault:
#    vault auth enable kubernetes
#
# 2. Configure Kubernetes auth:
#    vault write auth/kubernetes/config \
#      kubernetes_host="https://$KUBERNETES_PORT_443_TCP_ADDR:443" \
#      kubernetes_ca_cert=@/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
#
# 3. Create policy for secret access:
#    vault policy write lmnr-app-policy - <<EOF
#    path "secret/data/lmnr" {
#      capabilities = ["read"]
#    }
#    EOF
#
# 4. Create Kubernetes auth role:
#    vault write auth/kubernetes/role/lmnr-app \
#      bound_service_account_names=lmnr-vault-sa \
#      bound_service_account_namespaces=default \
#      policies=lmnr-app-policy \
#      ttl=24h
#
# 5. Store secrets in Vault (KV v2):
#    vault kv put secret/lmnr \
#      NEXTAUTH_SECRET="your-value" \
#      RABBITMQ_DEFAULT_USER="admin" \
#      RABBITMQ_DEFAULT_PASS="password123" \
#      POSTGRES_USER="lmnr" \
#      POSTGRES_PASSWORD="password123" \
#      DATABASE_URL="postgresql://lmnr:password123@postgres-service:5432/lmnr" \
#      RABBITMQ_URL="amqp://admin:password123@rabbitmq-service:5672/%2f" \
#      ... (all other secrets)
