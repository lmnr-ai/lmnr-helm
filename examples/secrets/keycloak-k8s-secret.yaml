# Example: Keycloak auth using a pre-existing Kubernetes Secret
#
# This example shows how to read Keycloak client credentials from
# a Kubernetes Secret that already exists in the cluster (e.g., created
# by the Keycloak operator, sealed-secrets, or external-secrets-operator).
#
# Prerequisites:
#   A K8s Secret named "keycloak-realm" with keys "client-id" and "client-secret":
#
#   apiVersion: v1
#   kind: Secret
#   metadata:
#     name: keycloak-realm
#   type: Opaque
#   data:
#     client-id: <base64-encoded-client-id>
#     client-secret: <base64-encoded-client-secret>
#
# The extraEnv entries use valueFrom.secretKeyRef to reference individual
# keys from that secret. Plain string values (like the issuer URL) use
# a standard "value:" field. These entries take precedence over any
# matching keys from secrets.data / envFrom.

frontend:
  extraEnv:
    - name: AUTH_KEYCLOAK_ID
      valueFrom:
        secretKeyRef:
          name: keycloak-realm
          key: client-id
    - name: AUTH_KEYCLOAK_SECRET
      valueFrom:
        secretKeyRef:
          name: keycloak-realm
          key: client-secret
    - name: AUTH_KEYCLOAK_ISSUER
      value: "https://keycloak.example.com/realms/my-realm"
