# Example: Traditional Kubernetes Secrets Only
# All secrets are provided directly in values file, no external secret management

secrets:
  enabled: true
  enableDatabaseSSL: false

  # AWS Secrets Manager - DISABLED
  awsSecretsManager:
    enabled: false

  # HashiCorp Vault - DISABLED
  vault:
    enabled: false

  # All secrets provided here
  data:
    NEXTAUTH_SECRET: "your-nextauth-secret-here"
    RABBITMQ_ERLANG_COOKIE: "rabbitmq-erlang-cookie"
    RABBITMQ_DEFAULT_USER: "admin"
    RABBITMQ_DEFAULT_PASS: "rabbitmq123"
    CLICKHOUSE_USER: "default"
    CLICKHOUSE_PASSWORD: "clickhouse123"
    POSTGRES_USER: "lmnr"
    POSTGRES_PASSWORD: "lmnr123"
    AEAD_SECRET_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
    SHARED_SECRET_TOKEN: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

    # AWS credentials for S3 access
    AWS_ACCESS_KEY_ID: "your-aws-access-key"
    AWS_SECRET_ACCESS_KEY: "your-aws-secret-key"
    AWS_REGION: "us-east-1"
    S3_EXPORTS_BUCKET: "your-exports-bucket"

    # App Server secrets
    PYTHON_ONLINE_EVALUATOR_URL: "https://your-evaluator-url"
    CLICKHOUSE_RO_USER: "default"
    CLICKHOUSE_RO_PASSWORD: "clickhouse123"

    # App Server Consumer secrets
    TRACE_SUMMARIZER_SECRET_KEY: "your-trace-summarizer-key"
    TRACE_SUMMARIZER_URL: "https://your-summarizer-url"
    TRACE_EVENT_IDENTIFIER_URL: "https://your-identifier-url"
    SLACK_ENCRYPTION_KEY: "your-slack-encryption-key"
    CLUSTER_ENDPOINT: "https://your-cluster-endpoint"
    CLUSTER_ENDPOINT_KEY: "your-cluster-key"
    ONLINE_EVALUATORS_SECRET_KEY: "your-evaluators-key"

    # Frontend secrets - Auth providers
    AUTH_GITHUB_ID: "your-github-client-id"
    AUTH_GITHUB_SECRET: "your-github-client-secret"
    AUTH_GOOGLE_ID: "your-google-client-id"
    AUTH_GOOGLE_SECRET: "your-google-client-secret"
    AUTH_AZURE_AD_CLIENT_ID: "your-azure-client-id"
    AUTH_AZURE_AD_CLIENT_SECRET: "your-azure-client-secret"
    AUTH_AZURE_AD_TENANT_ID: "your-azure-tenant-id"

    # Frontend secrets - Integrations
    STRIPE_SECRET_KEY: "sk_test_your_stripe_key"
    STRIPE_WEBHOOK_ENDPOINT_SECRET: "whsec_your_webhook_secret"
    RESEND_API_KEY: "re_your_resend_key"
    GITHUB_TOKEN: "ghp_your_github_token"
    LAMINAR_API_KEY: "your-laminar-key"
    SUPABASE_JWT_SECRET: "your-supabase-jwt-secret"

    # Frontend secrets - Worker URLs
    DATASET_EXPORT_WORKER_URL: "https://your-export-worker"
    DATASET_EXPORT_SECRET_KEY: "your-export-key"
    DATA_EXPORTER_URL: "https://your-data-exporter"
    DATA_EXPORTER_SECRET_KEY: "your-exporter-key"

    # Frontend secrets - Slack
    SLACK_CLIENT_ID: "your-slack-client-id"
    SLACK_CLIENT_SECRET: "your-slack-client-secret"
    SLACK_SIGNING_SECRET: "your-slack-signing-secret"
    SLACK_REDIRECT_URL: "https://your-app/api/slack/callback"

    # Frontend secrets - Other
    OPENAI_API_KEY: "sk-your-openai-key"
    GOOGLE_GENERATIVE_AI_API_KEY: "your-google-ai-key"
    LMNR_PROJECT_API_KEY: "your-lmnr-project-key"

    # Quickwit secrets
    QUICKWIT_DATABASE_URL: "postgres://lmnr:lmnr123@laminar-postgres-service:5432/postgres"
