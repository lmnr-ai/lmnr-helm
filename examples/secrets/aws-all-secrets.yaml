# Example: All Secrets from AWS Secrets Manager
# Fetches all application secrets from a single JSON secret in AWS Secrets Manager
#
# Note: Auto-generated URLs (DATABASE_URL, RABBITMQ_URL) are NOT generated when their
# component credentials are in external stores. You MUST include these URLs in your
# AWS secret if you're fetching POSTGRES_USER, POSTGRES_PASSWORD, etc. from AWS.

secrets:
  enabled: true
  enableDatabaseSSL: false

  # AWS Secrets Manager configuration
  awsSecretsManager:
    enabled: true
    region: "us-east-1"

    # IAM role for IRSA
    serviceAccount:
      create: true
      name: "lmnr-secrets-sa"
      # Provide your IAM role ARN here (or leave empty if using pre-configured IRSA)
      roleArn: "arn:aws:iam::123456789012:role/lmnr-secrets-role"

    # Option 1: Use clusterName pattern (secret name will be: {clusterName}/lmnr-secrets)
    clusterName: "production"
    # Option 2: Or specify explicit secret name/ARN (takes precedence over clusterName)
    # secretName: "production/lmnr-secrets"
    # secretName: "arn:aws:secretsmanager:us-east-1:123456789012:secret:production/lmnr-secrets-AbCdEf"

    # List ALL secrets to fetch from AWS
    # These will NOT use values from secrets.data
    secretKeys:
      - NEXTAUTH_SECRET
      - RABBITMQ_ERLANG_COOKIE
      - RABBITMQ_DEFAULT_USER
      - RABBITMQ_DEFAULT_PASS
      - CLICKHOUSE_USER
      - CLICKHOUSE_PASSWORD
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - AEAD_SECRET_KEY
      - SHARED_SECRET_TOKEN
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_REGION
      - S3_EXPORTS_BUCKET
      - PYTHON_ONLINE_EVALUATOR_URL
      - CLICKHOUSE_RO_USER
      - CLICKHOUSE_RO_PASSWORD
      - TRACE_SUMMARIZER_SECRET_KEY
      - TRACE_SUMMARIZER_URL
      - TRACE_EVENT_IDENTIFIER_URL
      - SLACK_ENCRYPTION_KEY
      - CLUSTER_ENDPOINT
      - CLUSTER_ENDPOINT_KEY
      - ONLINE_EVALUATORS_SECRET_KEY
      - AUTH_GITHUB_ID
      - AUTH_GITHUB_SECRET
      - AUTH_GOOGLE_ID
      - AUTH_GOOGLE_SECRET
      - AUTH_AZURE_AD_CLIENT_ID
      - AUTH_AZURE_AD_CLIENT_SECRET
      - AUTH_AZURE_AD_TENANT_ID
      - AUTH_OKTA_CLIENT_ID
      - AUTH_OKTA_CLIENT_SECRET
      - AUTH_OKTA_ISSUER
      - AUTH_KEYCLOAK_ID
      - AUTH_KEYCLOAK_SECRET
      - AUTH_KEYCLOAK_ISSUER
      - STRIPE_SECRET_KEY
      - STRIPE_WEBHOOK_ENDPOINT_SECRET
      - RESEND_API_KEY
      - GITHUB_TOKEN
      - LAMINAR_API_KEY
      - SUPABASE_JWT_SECRET
      - DATASET_EXPORT_WORKER_URL
      - DATASET_EXPORT_SECRET_KEY
      - DATA_EXPORTER_URL
      - DATA_EXPORTER_SECRET_KEY
      - SLACK_CLIENT_ID
      - SLACK_CLIENT_SECRET
      - SLACK_SIGNING_SECRET
      - SLACK_REDIRECT_URL
      - OPENAI_API_KEY
      - GOOGLE_GENERATIVE_AI_API_KEY
      - LMNR_PROJECT_API_KEY
      - QUICKWIT_DATABASE_URL
      - DATABASE_URL
      - RABBITMQ_URL

  # Vault - DISABLED
  vault:
    enabled: false

  # Placeholder values - not used since all secrets come from AWS
  # However, secrets.data must still define the full schema
  data:
    NEXTAUTH_SECRET: ""
    RABBITMQ_ERLANG_COOKIE: ""
    RABBITMQ_DEFAULT_USER: ""
    RABBITMQ_DEFAULT_PASS: ""
    CLICKHOUSE_USER: ""
    CLICKHOUSE_PASSWORD: ""
    POSTGRES_USER: ""
    POSTGRES_PASSWORD: ""
    AEAD_SECRET_KEY: ""
    SHARED_SECRET_TOKEN: ""
    AWS_ACCESS_KEY_ID: ""
    AWS_SECRET_ACCESS_KEY: ""
    AWS_REGION: ""
    S3_EXPORTS_BUCKET: ""
    PYTHON_ONLINE_EVALUATOR_URL: ""
    CLICKHOUSE_RO_USER: ""
    CLICKHOUSE_RO_PASSWORD: ""
    TRACE_SUMMARIZER_SECRET_KEY: ""
    TRACE_SUMMARIZER_URL: ""
    TRACE_EVENT_IDENTIFIER_URL: ""
    SLACK_ENCRYPTION_KEY: ""
    CLUSTER_ENDPOINT: ""
    CLUSTER_ENDPOINT_KEY: ""
    ONLINE_EVALUATORS_SECRET_KEY: ""
    AUTH_GITHUB_ID: ""
    AUTH_GITHUB_SECRET: ""
    AUTH_GOOGLE_ID: ""
    AUTH_GOOGLE_SECRET: ""
    AUTH_AZURE_AD_CLIENT_ID: ""
    AUTH_AZURE_AD_CLIENT_SECRET: ""
    AUTH_AZURE_AD_TENANT_ID: ""
    AUTH_OKTA_CLIENT_ID: ""
    AUTH_OKTA_CLIENT_SECRET: ""
    AUTH_OKTA_ISSUER: ""
    AUTH_KEYCLOAK_ID: ""
    AUTH_KEYCLOAK_SECRET: ""
    AUTH_KEYCLOAK_ISSUER: ""
    STRIPE_SECRET_KEY: ""
    STRIPE_WEBHOOK_ENDPOINT_SECRET: ""
    RESEND_API_KEY: ""
    GITHUB_TOKEN: ""
    LAMINAR_API_KEY: ""
    SUPABASE_JWT_SECRET: ""
    DATASET_EXPORT_WORKER_URL: ""
    DATASET_EXPORT_SECRET_KEY: ""
    DATA_EXPORTER_URL: ""
    DATA_EXPORTER_SECRET_KEY: ""
    SLACK_CLIENT_ID: ""
    SLACK_CLIENT_SECRET: ""
    SLACK_SIGNING_SECRET: ""
    SLACK_REDIRECT_URL: ""
    OPENAI_API_KEY: ""
    GOOGLE_GENERATIVE_AI_API_KEY: ""
    LMNR_PROJECT_API_KEY: ""
    QUICKWIT_DATABASE_URL: ""

# Expected AWS Secret Structure (JSON format):
# {
#   "NEXTAUTH_SECRET": "actual-value",
#   "RABBITMQ_ERLANG_COOKIE": "actual-value",
#   "RABBITMQ_DEFAULT_USER": "admin",
#   "RABBITMQ_DEFAULT_PASS": "password123",
#   "POSTGRES_USER": "lmnr",
#   "POSTGRES_PASSWORD": "password123",
#   "DATABASE_URL": "postgresql://lmnr:password123@laminar-postgres-service:5432/lmnr",
#   "RABBITMQ_URL": "amqp://admin:password123@laminar-rabbitmq-service:5672/%2f",
#   ... all other keys listed in secretKeys ...
# }
