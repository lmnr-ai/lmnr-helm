# Example: Mixed Secrets from AWS, Vault, and Kubernetes
# Authentication secrets from AWS (managed by security team)
# Database credentials from Vault (managed by DBA team)
# Service configs from K8s (managed by dev team)

secrets:
  enabled: true
  enableDatabaseSSL: false

  # AWS Secrets Manager - Auth and API Keys
  awsSecretsManager:
    enabled: true
    region: "us-east-1"

    serviceAccount:
      create: true
      name: "lmnr-secrets-sa"
      roleArn: "arn:aws:iam::123456789012:role/lmnr-secrets-role"

    clusterName: "production"

    # Authentication and external integrations from AWS
    secretKeys:
      - NEXTAUTH_SECRET
      # OAuth providers
      - AUTH_GITHUB_ID
      - AUTH_GITHUB_SECRET
      - AUTH_GOOGLE_ID
      - AUTH_GOOGLE_SECRET
      - AUTH_AZURE_AD_CLIENT_ID
      - AUTH_AZURE_AD_CLIENT_SECRET
      - AUTH_AZURE_AD_TENANT_ID
      # Payment and communication
      - STRIPE_SECRET_KEY
      - STRIPE_WEBHOOK_ENDPOINT_SECRET
      - RESEND_API_KEY
      # AI APIs
      - OPENAI_API_KEY
      - GOOGLE_GENERATIVE_AI_API_KEY
      # Slack integration
      - SLACK_CLIENT_ID
      - SLACK_CLIENT_SECRET
      - SLACK_SIGNING_SECRET
      - SLACK_ENCRYPTION_KEY

  # HashiCorp Vault - Database Credentials
  vault:
    enabled: true
    address: "http://vault.default.svc.cluster.local:8200"
    authPath: "auth/kubernetes"
    role: "lmnr-app"

    serviceAccount:
      create: true
      name: "lmnr-vault-sa"

    kvVersion: "v2"
    secretPath: "secret/data/lmnr/databases"

    # Database credentials from Vault
    secretKeys:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - CLICKHOUSE_USER
      - CLICKHOUSE_PASSWORD
      - CLICKHOUSE_RO_USER
      - CLICKHOUSE_RO_PASSWORD
      - RABBITMQ_DEFAULT_USER
      - RABBITMQ_DEFAULT_PASS
      - RABBITMQ_ERLANG_COOKIE
      - QUICKWIT_DATABASE_URL

  # Kubernetes Secrets - Service Configuration
  # Everything else uses K8s defaults
  data:
    # AWS secrets (placeholders)
    NEXTAUTH_SECRET: ""
    AUTH_GITHUB_ID: ""
    AUTH_GITHUB_SECRET: ""
    AUTH_GOOGLE_ID: ""
    AUTH_GOOGLE_SECRET: ""
    AUTH_AZURE_AD_CLIENT_ID: ""
    AUTH_AZURE_AD_CLIENT_SECRET: ""
    AUTH_AZURE_AD_TENANT_ID: ""
    STRIPE_SECRET_KEY: ""
    STRIPE_WEBHOOK_ENDPOINT_SECRET: ""
    RESEND_API_KEY: ""
    OPENAI_API_KEY: ""
    GOOGLE_GENERATIVE_AI_API_KEY: ""
    SLACK_CLIENT_ID: ""
    SLACK_CLIENT_SECRET: ""
    SLACK_SIGNING_SECRET: ""
    SLACK_ENCRYPTION_KEY: ""

    # Vault secrets (placeholders)
    POSTGRES_USER: ""
    POSTGRES_PASSWORD: ""
    CLICKHOUSE_USER: ""
    CLICKHOUSE_PASSWORD: ""
    CLICKHOUSE_RO_USER: ""
    CLICKHOUSE_RO_PASSWORD: ""
    RABBITMQ_DEFAULT_USER: ""
    RABBITMQ_DEFAULT_PASS: ""
    RABBITMQ_ERLANG_COOKIE: ""
    QUICKWIT_DATABASE_URL: ""

    # K8s managed secrets - Service configuration and internal keys
    AEAD_SECRET_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
    SHARED_SECRET_TOKEN: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

    # AWS configuration
    AWS_ACCESS_KEY_ID: "your-aws-access-key"
    AWS_SECRET_ACCESS_KEY: "your-aws-secret-key"
    AWS_REGION: "us-east-1"
    S3_TRACE_PAYLOADS_BUCKET: "my-traces-bucket"
    S3_EXPORTS_BUCKET: "my-exports-bucket"

    # Service URLs
    PYTHON_ONLINE_EVALUATOR_URL: "https://evaluator.example.com"
    TRACE_SUMMARIZER_URL: "https://summarizer.example.com"
    TRACE_EVENT_IDENTIFIER_URL: "https://identifier.example.com"
    CLUSTER_ENDPOINT: "https://cluster.example.com"
    DATASET_EXPORT_WORKER_URL: "https://export-worker.example.com"
    DATA_EXPORTER_URL: "https://data-exporter.example.com"
    SLACK_REDIRECT_URL: "https://your-app.example.com/api/slack/callback"

    # Service keys
    ONLINE_EVALUATORS_SECRET_KEY: "your-evaluators-key"
    TRACE_SUMMARIZER_SECRET_KEY: "your-summarizer-key"
    DATASET_EXPORT_SECRET_KEY: "your-export-key"
    DATA_EXPORTER_SECRET_KEY: "your-exporter-key"
    CLUSTER_ENDPOINT_KEY: "your-cluster-key"

    # Internal tokens
    GITHUB_TOKEN: "ghp_your_github_token"
    LAMINAR_API_KEY: "your-laminar-key"
    LMNR_PROJECT_API_KEY: "your-project-key"
    SUPABASE_JWT_SECRET: "your-supabase-jwt"

# This configuration demonstrates a three-tier secret management strategy:
#
# 1. AWS Secrets Manager (Tier 1 - Highest Security):
#    - OAuth credentials for external identity providers
#    - Payment processing secrets
#    - External API keys
#    Managed by: Security/Platform team
#
# 2. HashiCorp Vault (Tier 2 - Database Credentials):
#    - All database usernames and passwords
#    - Message queue credentials
#    Managed by: Database/Infrastructure team
#
# 3. Kubernetes Secrets (Tier 3 - Service Configuration):
#    - Internal service URLs
#    - Cloud storage configuration
#    - Internal API keys
#    Managed by: Development team
#
# Benefits:
# - Clear separation of responsibilities
# - Each team manages their own secret domain
# - Flexibility to migrate secrets between tiers
# - Gradual adoption of external secret management
