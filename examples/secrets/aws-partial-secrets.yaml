# Example: Partial Secrets from AWS, Rest from Kubernetes
# Sensitive secrets (auth, API keys) from AWS
# Service configs and non-sensitive values from K8s

secrets:
  enabled: true
  enableDatabaseSSL: false

  # AWS Secrets Manager configuration
  awsSecretsManager:
    enabled: true
    region: "us-east-1"

    serviceAccount:
      create: true
      name: "lmnr-secrets-sa"
      roleArn: "arn:aws:iam::123456789012:role/lmnr-secrets-role"

    clusterName: "production"

    # Only fetch SENSITIVE secrets from AWS
    secretKeys:
      # Core secrets
      - NEXTAUTH_SECRET
      - AEAD_SECRET_KEY
      - SHARED_SECRET_TOKEN
      # Authentication providers
      - AUTH_GITHUB_ID
      - AUTH_GITHUB_SECRET
      - AUTH_GOOGLE_ID
      - AUTH_GOOGLE_SECRET
      - AUTH_AZURE_AD_CLIENT_ID
      - AUTH_AZURE_AD_CLIENT_SECRET
      - AUTH_AZURE_AD_TENANT_ID
      # Payment and external integrations
      - STRIPE_SECRET_KEY
      - STRIPE_WEBHOOK_ENDPOINT_SECRET
      - RESEND_API_KEY
      - OPENAI_API_KEY
      - GOOGLE_GENERATIVE_AI_API_KEY
      # Slack integration
      - SLACK_CLIENT_ID
      - SLACK_CLIENT_SECRET
      - SLACK_SIGNING_SECRET
      - SLACK_ENCRYPTION_KEY
      # Cloud credentials
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      # Encryption and security keys
      - ONLINE_EVALUATORS_SECRET_KEY
      - TRACE_SUMMARIZER_SECRET_KEY
      - DATASET_EXPORT_SECRET_KEY
      - DATA_EXPORTER_SECRET_KEY
      - CLUSTER_ENDPOINT_KEY

  # Vault - DISABLED
  vault:
    enabled: false

  # NON-SENSITIVE secrets - provided directly in K8s
  # These will be used as fallback since they're not in AWS secretKeys
  data:
    # Placeholders for AWS secrets (not used)
    NEXTAUTH_SECRET: ""
    AEAD_SECRET_KEY: ""
    SHARED_SECRET_TOKEN: ""
    AUTH_GITHUB_ID: ""
    AUTH_GITHUB_SECRET: ""
    AUTH_GOOGLE_ID: ""
    AUTH_GOOGLE_SECRET: ""
    AUTH_AZURE_AD_CLIENT_ID: ""
    AUTH_AZURE_AD_CLIENT_SECRET: ""
    AUTH_AZURE_AD_TENANT_ID: ""
    STRIPE_SECRET_KEY: ""
    STRIPE_WEBHOOK_ENDPOINT_SECRET: ""
    RESEND_API_KEY: ""
    OPENAI_API_KEY: ""
    GOOGLE_GENERATIVE_AI_API_KEY: ""
    SLACK_CLIENT_ID: ""
    SLACK_CLIENT_SECRET: ""
    SLACK_SIGNING_SECRET: ""
    SLACK_ENCRYPTION_KEY: ""
    AWS_ACCESS_KEY_ID: ""
    AWS_SECRET_ACCESS_KEY: ""
    ONLINE_EVALUATORS_SECRET_KEY: ""
    TRACE_SUMMARIZER_SECRET_KEY: ""
    DATASET_EXPORT_SECRET_KEY: ""
    DATA_EXPORTER_SECRET_KEY: ""
    CLUSTER_ENDPOINT_KEY: ""

    # Service credentials - managed in K8s for simplicity
    RABBITMQ_ERLANG_COOKIE: "rabbitmq-erlang-cookie"
    RABBITMQ_DEFAULT_USER: "admin"
    RABBITMQ_DEFAULT_PASS: "rabbitmq123"
    CLICKHOUSE_USER: "default"
    CLICKHOUSE_PASSWORD: "clickhouse123"
    CLICKHOUSE_RO_USER: "default"
    CLICKHOUSE_RO_PASSWORD: "clickhouse123"
    POSTGRES_USER: "lmnr"
    POSTGRES_PASSWORD: "lmnr123"

    # AWS configuration (non-sensitive)
    AWS_REGION: "us-east-1"
    S3_TRACE_PAYLOADS_BUCKET: "my-traces-bucket"
    S3_EXPORTS_BUCKET: "my-exports-bucket"

    # Service URLs and endpoints
    PYTHON_ONLINE_EVALUATOR_URL: "https://evaluator.example.com"
    TRACE_SUMMARIZER_URL: "https://summarizer.example.com"
    TRACE_EVENT_IDENTIFIER_URL: "https://identifier.example.com"
    CLUSTER_ENDPOINT: "https://cluster.example.com"
    DATASET_EXPORT_WORKER_URL: "https://export-worker.example.com"
    DATA_EXPORTER_URL: "https://data-exporter.example.com"
    SLACK_REDIRECT_URL: "https://your-app.example.com/api/slack/callback"

    # Tokens and keys for internal services
    GITHUB_TOKEN: "ghp_your_github_token"
    LAMINAR_API_KEY: "your-laminar-key"
    LMNR_PROJECT_API_KEY: "your-project-key"
    SUPABASE_JWT_SECRET: "your-supabase-jwt"

    # Database connection for Quickwit
    QUICKWIT_DATABASE_URL: "postgres://lmnr:lmnr123@laminar-postgres-service:5432/postgres"

# Expected AWS Secret Structure (JSON format):
# Only the keys listed in secretKeys above
# {
#   "NEXTAUTH_SECRET": "actual-value",
#   "AEAD_SECRET_KEY": "actual-value",
#   "AUTH_GITHUB_ID": "actual-value",
#   ... only sensitive keys ...
# }
