# Example: Using extraEnv to reference pre-existing Kubernetes Secrets
#
# Use extraEnv when you manage secrets outside of this chart — for example,
# via sealed-secrets, external-secrets-operator, a Keycloak operator, or
# any other controller that creates Kubernetes Secrets.
#
# extraEnv entries support the full Kubernetes env var spec:
#   - value:                    plain string
#   - valueFrom.secretKeyRef:  key from an existing K8s Secret
#   - valueFrom.configMapKeyRef: key from a ConfigMap
#
# These entries take precedence over matching keys from secrets.data / envFrom.
#
# Available on: frontend, appServer, appServerConsumer

# --- Keycloak example ---
# Read client credentials from a pre-existing "keycloak-realm" Secret
# and set the issuer as a plain value.
frontend:
  extraEnv:
    - name: AUTH_KEYCLOAK_ID
      valueFrom:
        secretKeyRef:
          name: keycloak-realm
          key: client-id
    - name: AUTH_KEYCLOAK_SECRET
      valueFrom:
        secretKeyRef:
          name: keycloak-realm
          key: client-secret
    - name: AUTH_KEYCLOAK_ISSUER
      value: "https://keycloak.example.com/realms/my-realm"

