# Traefik routes for the Laminar app server.
#
# Port 443 (HTTP trace ingestion):
#   HTTPS IngressRoute → laminar-app-server-service:8080 (nginx sidecar)
#   nginx filters traffic to /v1/* and /health only, then proxies to the Rust server on 8000.
#
# Port 8443 (gRPC trace ingestion):
#   HTTPS IngressRoute → laminar-app-server-service:8001 (plaintext h2c gRPC)
#   Traefik terminates TLS on port 8443 and forwards plaintext HTTP/2 (h2c) to the backend.
#   gRPC clients connect with TLS on port 8443 — standard TLS gRPC, no special SDK config needed.
#   Both ports share the same TLS certificate (laminar-app-server-tls).
#
# Prerequisites:
#   - Traefik installed with traefik-install.yaml (includes the 'grpc' HTTP/2 entrypoint)
#   - cert-manager installed with cert-manager-clusterissuer.yaml applied
#   - DNS A record for API_HOSTNAME pointing to Traefik's external IP
#   - appServer.ingress.hostname set in your Laminar values (even if not using a standard
#     Kubernetes Ingress). This is required for ports 8080 (nginx) and 8001 (gRPC) to be
#     added to the laminar-app-server-service ClusterIP Service. Without it, these routes
#     will have no backend to connect to.
#
# Edit API_HOSTNAME before applying.

---
# HTTPS route for HTTP trace ingestion (port 443)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: laminar-app-server-https
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`API_HOSTNAME`)   # e.g. api.yourdomain.com
      kind: Rule
      services:
        - name: laminar-app-server-service
          port: 8080
  tls:
    secretName: laminar-app-server-tls
---
# TLS-terminating gRPC route (port 8443)
# Traefik terminates TLS and forwards plaintext HTTP/2 (h2c) to the backend on port 8001.
# gRPC clients connect using standard TLS gRPC on port 8443.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: laminar-app-server-grpc
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  entryPoints:
    - grpc   # the HTTP/2 entrypoint on port 8443 defined in traefik-install.yaml
  routes:
    - match: Host(`API_HOSTNAME`)   # e.g. api.yourdomain.com
      kind: Rule
      services:
        - name: laminar-app-server-service
          port: 8001
          scheme: h2c   # forward as plaintext HTTP/2 to the backend
  tls:
    secretName: laminar-app-server-tls
---
# cert-manager Certificate for the app server
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: laminar-app-server-tls
  namespace: default
spec:
  secretName: laminar-app-server-tls
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
  dnsNames:
    - API_HOSTNAME   # e.g. api.yourdomain.com
