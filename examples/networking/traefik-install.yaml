# Traefik Helm values for Laminar
# Install with:
#   helm upgrade -i traefik traefik/traefik \
#     --namespace traefik --create-namespace \
#     -f traefik-install.yaml

service:
  type: LoadBalancer

# Expose port 8443 as an additional HTTP/2 entrypoint for gRPC (TLS-terminating)
ports:
  web:
    port: 80
    expose:
      default: true
  websecure:
    port: 443
    expose:
      default: true
    tls:
      enabled: true
  grpc:
    port: 8443
    expose:
      default: true
    tls:
      enabled: true
    # HTTP/2 entrypoint — Traefik terminates TLS, forwards plaintext h2c gRPC to the backend

# Allow Traefik to read IngressRoute resources across all namespaces
providers:
  kubernetesCRD:
    allowCrossNamespace: true
  kubernetesIngress:
    publishedService:
      enabled: true
