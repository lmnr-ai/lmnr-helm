# Using Spot Instances for cost optimization
# This example shows how to run stateless services on spot instances
# while keeping stateful services on on-demand instances
#
# Benefits:
#   - Up to 90% cost savings for stateless workloads
#   - Stateful services remain on reliable on-demand instances
#
# Prerequisites:
#   - Node groups must be tainted with spot instance labels
#   - Stateless services should handle interruptions gracefully

# Frontend can use spot instances (stateless)
frontend:
  # Tolerate spot instance taints
  tolerations:
    - key: "node.kubernetes.io/instance-type"
      operator: "Equal"
      value: "spot"
      effect: "NoSchedule"
  # Prefer spot instances
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
          - key: "node.kubernetes.io/instance-type"
            operator: In
            values:
            - spot

# App Server can use spot instances (stateless)
appServer:
  tolerations:
    - key: "node.kubernetes.io/instance-type"
      operator: "Equal"
      value: "spot"
      effect: "NoSchedule"
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
          - key: "node.kubernetes.io/instance-type"
            operator: In
            values:
            - spot

# Databases MUST use on-demand instances (stateful)
postgres:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: "node.kubernetes.io/instance-type"
            operator: NotIn
            values:
            - spot

clickhouse:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: "node.kubernetes.io/instance-type"
            operator: NotIn
            values:
            - spot

rabbitmq:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: "node.kubernetes.io/instance-type"
            operator: NotIn
            values:
            - spot

