# Laminar Helm Chart - Minimal Configuration Template
#
# This file contains the minimal required configuration to get Laminar running.
# It overrides the defaults in values.yaml - you only need to specify what you want to change.
#
# Quick Start:
#   1. Edit this file — replace ALL placeholder values (<region>, <bucket-name>, etc.) with real values
#   2. Install: helm upgrade -i laminar ./charts/laminar -f laminar.yaml
#   3. Get ingress URL: kubectl get ingress laminar-frontend-ingress -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
#   4. Update NEXTAUTH_URL with ingress URL and upgrade again
#
# For advanced configuration options, see:
#   - values.yaml (for all available options)
#   - CONFIGURATION.md (for detailed guides)
#   - examples/ directory (for example configurations)

global:
  # Cloud provider: "aws" or "gcp"
  cloudProvider: "aws"
  environment: "FULL"
  # # Namespace for all resources (default: default)
  # # Uncomment the below line to use a custom namespace (e.g., "laminar")
  # namespace: "laminar"
  # # If not set, pods will not have any specific node group affinity
  # # Uncomment the below line to set a specific node group affinity
  # nodeGroupName: ""

secrets:
  enabled: true
  data:
    NEXTAUTH_SECRET: "your-secret"
    AWS_ACCESS_KEY_ID: "your-aws-access-key-id"
    AWS_SECRET_ACCESS_KEY: "your-secret-access-key"
    AWS_REGION: "us-east-1"
    GOOGLE_GENERATIVE_AI_API_KEY: "AIzaSy..." # your Gemini api key
    AEAD_SECRET_KEY: "your-aead-secret (can be generated with `openssl rand -hex 32`)" # aead secret used to encrypt Laminar project api keys and model API keys for playground
    # Check out charts/laminar/values.yaml for full list of secrets
    # Refer to QUICKSTART.md for more details

frontend:
  env:
    nextauthUrl: "http://localhost:3000"
    nextPublicUrl: "http://localhost:3000"
  # Extra environment variables — use to reference pre-existing K8s Secrets
  # or inject additional config. These override matching keys from secrets.data.
  # extraEnv:
  #   # Read from an existing Kubernetes Secret
  #   - name: AUTH_KEYCLOAK_ID
  #     valueFrom:
  #       secretKeyRef:
  #         name: keycloak-realm
  #         key: client-id
  #   - name: AUTH_KEYCLOAK_SECRET
  #     valueFrom:
  #       secretKeyRef:
  #         name: keycloak-realm
  #         key: client-secret
  #   # Plain string value
  #   - name: AUTH_KEYCLOAK_ISSUER
  #     value: "https://keycloak.example.com/realms/my-realm"

quickwit:
  s3:
    defaultIndexRootUri: "s3://your-bucket-name/indexes"
    region: "<region>"

appServerConsumer:
  env:
    signalsLlmProvider: "gemini" # or bedrock
    # model name for gemini, or Inference Profile ID for bedrock
    # defaults to smaller models: gemini-3-flash and haiku-4.5
    #
    # uncomment or overwrite to set to custom model
    # signalsLlmModel: "gemini-3-flash"
  # Extra environment variables for app-server-consumer (same format as frontend.extraEnv)
  # extraEnv:
  #   - name: CUSTOM_VAR
  #     valueFrom:
  #       secretKeyRef:
  #         name: my-secret
  #         key: my-key

clickhouse:
  s3:
    # S3 bucket endpoint (replace with your bucket)
    endpoint: "https://<bucket-name>.s3.<region>.amazonaws.com/"
    # S3 region (replace with your region)
    region: "<region>"
    # S3 access credentials - can use secrets instead
    # accessKeyId: ""
    # secretAccessKey: ""
    # Use environment credentials or EC2 instance profile
    useEnvironmentCredentials: false

storage:
  storageClass:
    # Availability zones for the storage class. Required for AWS EBS.
    # For GCP, you can often leave this empty or comment it out.
    zones:
      - "us-east-1a"
