# Laminar Helm Chart - Minimal Configuration Template
#
# This file contains the minimal required configuration to get Laminar running.
# It overrides the defaults in values.yaml - you only need to specify what you want to change.
#
# Quick Start:
#   1. Edit this file — replace ALL placeholder values (<region>, <bucket-name>, etc.) with real values
#   2. Install: helm upgrade -i laminar ./charts/laminar -f laminar.yaml
#   3. Get ingress URL: kubectl get ingress laminar-frontend-ingress -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
#   4. Update NEXTAUTH_URL with ingress URL and upgrade again
#
# For advanced configuration options, see:
#   - values.yaml (for all available options)
#   - CONFIGURATION.md (for detailed guides)
#   - examples/ directory (for example configurations)

global:
  # Cloud provider: "aws" or "gcp"
  cloudProvider: "aws"
  environment: "FULL"
  # Frontend URL dispatched to all pods as NEXT_PUBLIC_URL. Used for crafting
  # frontend URLs in alert/signal notifications and for lmnr-cli auth.
  # Set to your actual frontend URL (same value as nextauthUrl below).
  nextPublicUrl: "http://localhost:3000"
  # # Namespace for all resources (default: default)
  # # Uncomment the below line to use a custom namespace (e.g., "laminar")
  # namespace: "laminar"
  # # If not set, pods will not have any specific node group affinity
  # # Uncomment the below line to set a specific node group affinity
  # nodeGroupName: ""

secrets:
  enabled: true
  data:
    NEXTAUTH_SECRET: "your-secret"
    AWS_ACCESS_KEY_ID: "your-aws-access-key-id"
    AWS_SECRET_ACCESS_KEY: "your-secret-access-key"
    AWS_REGION: "us-east-1"
    # LLM provider API key. Required when llmProvider is "gemini" or "openai".
    # For bedrock, leave empty — AWS_* credentials are used instead.
    LLM_API_KEY: "AIzaSy..." # your Gemini / OpenAI / OpenAI-compatible key that will be used both in the frontend and app-server-consumer
    AEAD_SECRET_KEY: "your-aead-secret (can be generated with `openssl rand -hex 32`)" # aead secret used to encrypt Laminar project api keys and model API keys for playground
    # Check out charts/laminar/values.yaml for full list of secrets
    # To enable integration with official Laminar Slack app, set the license key below
    # LMNR_LICENSE_KEY: "<your-license-key>"
    # Refer to QUICKSTART.md for more details

frontend:
  env:
    nextauthUrl: "http://localhost:3000"
    # LLM provider for AI features (SQL-with-AI).
    # One of: "openai" | "gemini" | "bedrock".
    llmProvider: "gemini"
    # For OpenAI-compatible gateways (LiteLLM, OpenRouter, vLLM):
    # llmBaseUrl: "http://my-gateway:4000"
    # Optional non-sensitive HTTP headers for LLM provider requests:
    llmDefaultHeaders: {}
    # Example:
    # llmDefaultHeaders:
    #   x-skip-generative-ai-check: "true"
  # Extra environment variables — use to reference pre-existing K8s Secrets
  # or inject additional config. These override matching keys from secrets.data.
  # extraEnv:
  #   # Read from an existing Kubernetes Secret
  #   - name: AUTH_KEYCLOAK_ID
  #     valueFrom:
  #       secretKeyRef:
  #         name: keycloak-realm
  #         key: client-id
  #   - name: AUTH_KEYCLOAK_SECRET
  #     valueFrom:
  #       secretKeyRef:
  #         name: keycloak-realm
  #         key: client-secret
  #   # Plain string value
  #   - name: AUTH_KEYCLOAK_ISSUER
  #     value: "https://keycloak.example.com/realms/my-realm"

quickwit:
  s3:
    # REQUIRED to enable Quickwit. Point at a bucket you own; the chart
    # treats this as the master switch for the whole Quickwit stack
    # (workloads + QUICKWIT_*_URL env vars on app pods). Leave empty to
    # disable Quickwit (search is gracefully disabled — the rest of the
    # platform works as normal).
    defaultIndexRootUri: ""
    region: "<region>"
    # On GCS, `flavor` and `endpoint` are auto-filled from
    # `global.cloudProvider: gcp` — no need to set them here. Supply HMAC
    # credentials via `quickwit.extraEnv` (Quickwit reads AWS_ACCESS_KEY_ID
    # / AWS_SECRET_ACCESS_KEY directly). See examples/quickwit-gcs-storage.yaml.
    # For non-AWS/GCP S3 stores (MinIO, R2, etc.), set `flavor` and
    # `endpoint` explicitly here to override the cloud-provider defaults.

appServerConsumer:
  env:
    # LLM provider for Signals feature.
    # One of: "openai" | "gemini" | "bedrock".
    llmProvider: "gemini"
    # Optional base URL override. Used with llmProvider: openai for OpenAI-compatible gateways
    # llmBaseUrl: "http://my-gateway:4000"
    #
    # Optional non-sensitive HTTP headers for LLM provider requests:
    # llmDefaultHeaders:
    #   x-skip-generative-ai-check: "true"
    #
    # Optional model overrides per size tier. Per-provider defaults apply when empty.
    # llmModelSmall: "gemini-3-flash-preview"
    # llmModelMedium: "gemini-3-flash-preview"
    # llmModelLarge: "gemini-3-pro-preview"
    #
    # Extra environment variables for app-server-consumer (same format as frontend.extraEnv)
    # extraEnv:
    #   - name: CUSTOM_VAR
    #     valueFrom:
    #       secretKeyRef:
    #         name: my-secret
    #         key: my-key

appServer:
  env:
    # LLM provider for platform agent features (chat with trace, etc.).
    # One of: "openai" | "gemini" | "bedrock".
    llmProvider: "gemini"
    # Optional base URL override. Used with llmProvider: openai for OpenAI-compatible gateways
    # llmBaseUrl: "http://my-gateway:4000"
    #
    # Optional non-sensitive HTTP headers for LLM provider requests:
    # llmDefaultHeaders:
    #   x-skip-generative-ai-check: "true"
    #
    # Optional model overrides per size tier. Per-provider defaults apply when empty.
    # llmModelSmall: "gemini-3-flash-preview"
    # llmModelMedium: "gemini-3-flash-preview"
    # llmModelLarge: "gemini-3-pro-preview"
    #
    # Extra environment variables for app-server-consumer (same format as frontend.extraEnv)
    # extraEnv:
    #   - name: CUSTOM_VAR
    #     valueFrom:
    #       secretKeyRef:
    #         name: my-secret
    #         key: my-key

clickhouse:
  s3:
    # S3 bucket endpoint (replace with your bucket)
    endpoint: "https://<bucket-name>.s3.<region>.amazonaws.com/"
    # S3 region (replace with your region)
    region: "<region>"
    # S3 access credentials - can use secrets instead
    # accessKeyId: ""
    # secretAccessKey: ""
    # Use environment credentials or EC2 instance profile
    useEnvironmentCredentials: false

storage:
  storageClass:
    # Availability zones for the storage class. Required for AWS EBS.
    # For GCP, you can often leave this empty or comment it out.
    zones:
      - "us-east-1a"

# PII Redactor configuration (optional, off by default)
# CPU-only ONNX gRPC service that strips PII from spans before persistence.
# When enabled, PII_REDACTOR_URL is injected into the app-server and
# app-server-consumer pods, which activates the redaction feature.
piiRedactor:
  enabled: false
  # PII detection is CPU-intensive ONNX inference; size generously and
  # consider pinning to a dedicated compute-optimized node.
  # resources:
  #   requests:
  #     cpu: "2"
  #     memory: "4Gi"
  #   limits:
  #     cpu: "4"
  #     memory: "8Gi"
  # Node scheduling configuration — set these to attach the PII redactor to a
  # specific machine / node group (e.g. a compute-optimized instance).
  # Example:
  #   nodeSelector:
  #     node.kubernetes.io/instance-type: c8i.2xlarge
  #   tolerations:
  #     - key: "dedicated"
  #       operator: "Equal"
  #       value: "pii-redactor"
  #       effect: "NoSchedule"
  