# Laminar Helm Chart - Minimal Configuration Template
#
# This file contains the minimal required configuration to get Laminar running.
# It overrides the defaults in values.yaml - you only need to specify what you want to change.
#
# Quick Start:
#   1. Edit this file with your AWS credentials, S3 buckets, and availability zones
#   2. Install: helm upgrade -i laminar . -f laminar.yaml --namespace laminar --create-namespace
#   3. Get ALB URL: kubectl get ingress frontend-alb -n laminar -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
#   4. Update NEXTAUTH_URL with ALB URL and upgrade again
#
# For advanced configuration options, see:
#   - values.yaml (for all available options)
#   - CONFIGURATION.md (for detailed guides)
#   - examples/ directory (for example configurations)

global:
  environment: "FULL"
  # Namespace for all resources (default: laminar)
  namespace: "laminar"
  # # If not set, pods will not have any specific node group affinity
  # # Uncomment the below line to set a specific node group affinity
  # nodeGroupName: ""

secrets:
  enabled: true
  data:
    NEXTAUTH_SECRET: "your-secret"
    AWS_ACCESS_KEY_ID: "your-aws-access-key-id"
    AWS_SECRET_ACCESS_KEY: "your-secret-access-key"
    AWS_REGION: "us-east-1"
    S3_TRACE_PAYLOADS_BUCKET: "an-existing-bucket-for-trace-payloads"
    # This must be filled with the ingress URL after initial deployment
    # Refer to QUICKSTART.md for more details
    NEXTAUTH_URL: "https://localhost:3000"
    NEXTAUTH_PUBLIC_URL: "https://localhost:3000"

clickhouse:
  s3:
    # S3 bucket endpoint (replace with your bucket)
    endpoint: "https://my-clickhouse-bucket.s3.us-east-1.amazonaws.com/"
    # S3 region (replace with your region)
    region: "us-east-1"
    # S3 access credentials - can use secrets instead
    accessKeyId: ""
    secretAccessKey: ""
    # Use environment credentials or EC2 instance profile
    useEnvironmentCredentials: false
    # Local cache configuration for S3 data
    cache:
      enabled: true
      # Local disk path for cache
      path: "/var/lib/clickhouse/disks/s3_cache/"
      # Maximum cache size
      maxSize: "10Gi"
    # Metadata path for S3 disk
    metadataPath: "/var/lib/clickhouse/disks/s3_disk/"

storage:
  zones:
    - "us-east-1b"
