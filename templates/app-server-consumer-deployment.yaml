{{- if .Values.appServerConsumer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "laminar.resourceName" "app-server-consumer" }}
  labels:
    app: {{ include "laminar.resourceName" "app-server-consumer" }}
spec:
  replicas: {{ .Values.appServerConsumer.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: {{ include "laminar.resourceName" "app-server-consumer" }}
  template:
    metadata:
      labels:
        app: {{ include "laminar.resourceName" "app-server-consumer" }}
    spec:
      serviceAccountName: {{ include "lmnr.secrets.serviceAccountName" . }}
      {{- if .Values.appServerConsumer.waitForDependencies.enabled }}
      initContainers:
        {{- range .Values.appServerConsumer.waitForDependencies.services }}
        - name: wait-for-{{ .name }}
          image: busybox:latest
          command: ['sh', '-c', 'until nc -z {{ .host }} {{ .port }}; do echo "waiting for {{ .name }}..."; sleep 2; done; echo "{{ .name }} is ready"']
        {{- end }}
      {{- end }}
      containers:
        - name: app-server-consumer
          image: {{ .Values.images.repository }}/{{ .Values.images.appServer.name }}:{{ .Values.images.appServer.tag }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          ports:
            - containerPort: 8000
          resources:
            {{- toYaml .Values.appServerConsumer.resources | nindent 12 }}
          envFrom:
            {{- include "lmnr.secrets.envFrom" . | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 1
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 1
          env:
            - name: OPERATION_MODE
              value: "consumer"
            - name: PORT
              value: {{ .Values.appServerConsumer.env.port | quote }}
            - name: CONSUMER_PORT
              value: {{ .Values.appServerConsumer.env.consumerPort | quote }}
            - name: DATABASE_MAX_CONNECTIONS
              value: {{ .Values.appServerConsumer.env.databaseMaxConnections | quote }}
            - name: NUM_SPANS_WORKERS
              value: {{ .Values.appServerConsumer.env.numSpansWorkers | quote }}
            - name: NUM_BROWSER_EVENTS_WORKERS
              value: {{ .Values.appServerConsumer.env.numBrowserEventsWorkers | quote }}
            - name: NUM_NOTIFICATION_WORKERS
              value: {{ .Values.appServerConsumer.env.numNotificationWorkers | quote }}
            - name: NUM_CLUSTERING_WORKERS
              value: {{ .Values.appServerConsumer.env.numClusteringWorkers | quote }}
            - name: NUM_SEMANTIC_EVENT_WORKERS
              value: {{ .Values.appServerConsumer.env.numSemanticEventWorkers | quote }}
            - name: NUM_SPANS_INDEXER_WORKERS
              value: {{ .Values.appServerConsumer.env.numSpansIndexerWorkers | quote }}
            - name: SPANS_INDEXER_QUEUE_PREFETCH_COUNT
              value: {{ .Values.appServerConsumer.env.spansIndexerQueuePrefetchCount | quote }}
            - name: NUM_SIGNAL_JOB_SUBMISSION_BATCH_WORKERS
              value: {{ .Values.appServerConsumer.env.numSignalJobSubmissionBatchWorkers | quote }}
            - name: NUM_SIGNAL_JOB_PENDING_BATCH_WORKERS
              value: {{ .Values.appServerConsumer.env.numSignalJobPendingBatchWorkers | quote }}
            - name: SIGNAL_JOB_PENDING_BATCH_SIZE
              value: {{ .Values.appServerConsumer.env.signalJobPendingBatchSize | quote }}
            - name: SIGNAL_JOB_MAX_ALLOWED_STEPS
              value: {{ .Values.appServerConsumer.env.signalJobMaxAllowedSteps | quote }}
            - name: NUM_SIGNAL_JOB_REALTIME_WORKERS
              value: {{ .Values.appServerConsumer.env.numSignalJobRealtimeWorkers | quote }}
            - name: NUM_REPORTS_WORKERS
              value: {{ .Values.appServerConsumer.env.numReportsWorkers | quote }}
            - name: SIGNALS_LLM_PROVIDER
              value: {{ .Values.appServerConsumer.env.signalsLlmProvider | quote }}
            - name: SIGNALS_LLM_MODEL
              value: {{ .Values.appServerConsumer.env.signalsLlmModel | quote }}
            - name: SIGNALS_ALWAYS_USE_REALTIME
              value: {{ .Values.appServerConsumer.env.signalsAlwaysUseRealtime | quote }}
            - name: RABBITMQ_MAX_CHANNEL_POOL_SIZE
              value: {{ .Values.appServerConsumer.env.rabbitmqMaxChannelPoolSize | quote }}
            - name: REDIS_URL
              value: {{ .Values.appServerConsumer.env.redisUrl }}
            - name: ENVIRONMENT
              value: {{ .Values.global.environment }}
            - name: ENABLE_TRACING
              value: {{ .Values.appServerConsumer.env.enableTracing | quote }}
            - name: QUICKWIT_SEARCH_URL
              value: {{ .Values.appServerConsumer.env.quickwitSearchUrl }}
            - name: QUICKWIT_INGEST_URL
              value: {{ .Values.appServerConsumer.env.quickwitIngestUrl }}
            # All secrets loaded via envFrom from app-secrets, app-secrets-aws, app-secrets-vault
      {{- include "laminar.nodeSelector" (dict "service" .Values.appServerConsumer "global" .Values.global) | nindent 6 }}
      {{- include "laminar.affinity" (dict "service" .Values.appServerConsumer "global" .Values.global) | nindent 6 }}
      {{- include "laminar.tolerations" (dict "service" .Values.appServerConsumer "global" .Values.global) | nindent 6 }}
{{- end }}
