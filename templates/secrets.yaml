{{- if .Values.secrets.enabled }}
{{- $awsKeys := list }}
{{- if .Values.secrets.awsSecretsManager }}
{{- $awsKeys = .Values.secrets.awsSecretsManager.secretKeys | default list }}
{{- end }}
{{- $vaultKeys := list }}
{{- if .Values.secrets.vault }}
{{- $vaultKeys = .Values.secrets.vault.secretKeys | default list }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  labels:
    {{- include "laminar.labels" . | nindent 4 }}
  annotations:
    {{- include "laminar.annotations" . | nindent 4 }}
type: Opaque
data:
  {{- range $key, $value := .Values.secrets.data }}
  {{- if $value }}
  {{- if or (ne $key "DATABASE_SSL_ROOT_CERT") $.Values.secrets.enableDatabaseSSL }}
  {{- if and (not (has $key $awsKeys)) (not (has $key $vaultKeys)) }}
  {{ $key }}: {{ $value | b64enc }}
  {{- end }}
  {{- end }}
  {{- end }}
  {{- end }}
  # Auto-generated URLs from centralized secrets
  # These are only generated if NOT provided by external secret stores
  # AND if the component credentials are also not in external stores
  {{- $postgresUserExternal := or (has "POSTGRES_USER" $awsKeys) (has "POSTGRES_USER" $vaultKeys) }}
  {{- $postgresPasswordExternal := or (has "POSTGRES_PASSWORD" $awsKeys) (has "POSTGRES_PASSWORD" $vaultKeys) }}
  {{- $databaseUrlExternal := or (has "DATABASE_URL" $awsKeys) (has "DATABASE_URL" $vaultKeys) }}
  {{- if and (not $databaseUrlExternal) (not $postgresUserExternal) (not $postgresPasswordExternal) }}
  DATABASE_URL: {{ printf "postgresql://%s:%s@postgres-service:5432/%s" .Values.secrets.data.POSTGRES_USER .Values.secrets.data.POSTGRES_PASSWORD .Values.postgres.database | b64enc }}
  {{- end }}
  {{- if and (not (has "CLICKHOUSE_URL" $awsKeys)) (not (has "CLICKHOUSE_URL" $vaultKeys)) }}
  CLICKHOUSE_URL: {{ printf "http://clickhouse-service:8123" | b64enc }}
  {{- end }}
  {{- $rabbitmqUserExternal := or (has "RABBITMQ_DEFAULT_USER" $awsKeys) (has "RABBITMQ_DEFAULT_USER" $vaultKeys) }}
  {{- $rabbitmqPassExternal := or (has "RABBITMQ_DEFAULT_PASS" $awsKeys) (has "RABBITMQ_DEFAULT_PASS" $vaultKeys) }}
  {{- $rabbitmqUrlExternal := or (has "RABBITMQ_URL" $awsKeys) (has "RABBITMQ_URL" $vaultKeys) }}
  {{- if and (not $rabbitmqUrlExternal) (not $rabbitmqUserExternal) (not $rabbitmqPassExternal) }}
  RABBITMQ_URL: {{ printf "amqp://%s:%s@rabbitmq-service:5672/%%2f" .Values.secrets.data.RABBITMQ_DEFAULT_USER .Values.secrets.data.RABBITMQ_DEFAULT_PASS | b64enc }}
  {{- end }}
{{- end }}
