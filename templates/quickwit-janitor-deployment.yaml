{{- if .Values.quickwit.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "laminar.resourceName" "quickwit-janitor" }}
  labels:
    app.kubernetes.io/name: quickwit
    app.kubernetes.io/instance: quickwit
    app.kubernetes.io/version: {{ .Values.quickwit.version | quote }}
spec:
  replicas: {{ .Values.quickwit.janitor.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: quickwit
      app.kubernetes.io/instance: quickwit
      app.kubernetes.io/component: janitor
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: quickwit
        app.kubernetes.io/instance: quickwit
        app.kubernetes.io/component: janitor
    spec:
      serviceAccountName: {{ include "laminar.resourceName" "quickwit" }}
      securityContext:
        fsGroup: 1005
      containers:
        - name: quickwit
          securityContext:
            runAsNonRoot: true
            runAsUser: 1005
          image: "quickwit/quickwit:{{ .Values.quickwit.version }}"
          imagePullPolicy: IfNotPresent
          args: ["run", "--service", "janitor"]
          envFrom:
            {{- include "lmnr.secrets.envFrom" . | nindent 12 }}
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: QW_CONFIG
              value: /quickwit/node.yaml
            - name: QW_CLUSTER_ID
              value: {{ .Values.quickwit.clusterId }}
            - name: QW_NODE_ID
              value: "$(POD_NAME)"
            - name: QW_PEER_SEEDS
              value: {{ include "laminar.resourceName" "quickwit-headless" }}
            - name: QW_ADVERTISE_ADDRESS
              value: "$(POD_IP)"
            - name: QW_CLUSTER_ENDPOINT
              value: "http://{{ include "laminar.resourceName" "quickwit-metastore" }}.{{ include "laminar.namespace" . }}.svc.cluster.local:7280"
            - name: QW_METASTORE_URI
              value: "$(QUICKWIT_DATABASE_URL)"
          ports:
            - name: rest
              containerPort: 7280
              protocol: TCP
            - name: grpc
              containerPort: 7281
              protocol: TCP
            - name: discovery
              containerPort: 7282
              protocol: UDP
          startupProbe:
            failureThreshold: 12
            httpGet:
              path: /health/livez
              port: rest
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/livez
              port: rest
          readinessProbe:
            httpGet:
              path: /health/readyz
              port: rest
          volumeMounts:
            - name: config
              mountPath: /quickwit/node.yaml
              subPath: node.yaml
            - name: data
              mountPath: /quickwit/qwdata
          resources:
            {{- toYaml .Values.quickwit.janitor.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "laminar.resourceName" "quickwit" }}
            items:
              - key: node.yaml
                path: node.yaml
        - name: data
          emptyDir: {}
      {{- include "laminar.nodeSelector" (dict "service" .Values.quickwit "global" .Values.global) | nindent 6 }}
      {{- include "laminar.affinity" (dict "service" .Values.quickwit "global" .Values.global) | nindent 6 }}
      {{- include "laminar.tolerations" (dict "service" .Values.quickwit "global" .Values.global) | nindent 6 }}
{{- end }}
