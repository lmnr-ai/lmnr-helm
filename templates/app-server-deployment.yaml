{{- if .Values.appServer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-server
  labels:
    app: app-server
spec:
  replicas: {{ .Values.appServer.replicaCount }}
  selector:
    matchLabels:
      app: app-server
  template:
    metadata:
      labels:
        app: app-server
    spec:
      serviceAccountName: {{ include "lmnr.secrets.serviceAccountName" . }}
      {{- if .Values.appServer.waitForDependencies.enabled }}
      initContainers:
        {{- range .Values.appServer.waitForDependencies.services }}
        - name: wait-for-{{ .name }}
          image: busybox:latest
          command: ['sh', '-c', 'until nc -z {{ .host }} {{ .port }}; do echo "waiting for {{ .name }}..."; sleep 2; done; echo "{{ .name }} is ready"']
        {{- end }}
      {{- end }}
      containers:
        - name: app-server
          image: {{ .Values.images.repository }}/{{ .Values.images.appServer.name }}:{{ .Values.images.appServer.tag }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          ports:
            - containerPort: 8000
            - containerPort: 8001
          resources:
            {{- toYaml .Values.appServer.resources | nindent 12 }}
          envFrom:
            {{- include "lmnr.secrets.envFrom" . | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 1
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 1
          env:
            - name: OPERATION_MODE
              value: "producer"
            - name: PORT
              value: {{ .Values.appServer.env.port | quote }}
            - name: GRPC_PORT
              value: {{ .Values.appServer.env.grpcPort | quote }}
            - name: AGENT_MANAGER_URL
              value: {{ .Values.appServer.env.agentManagerUrl }}
            - name: DATABASE_MAX_CONNECTIONS
              value: {{ .Values.appServer.env.databaseMaxConnections | quote }}
            - name: RABBITMQ_MAX_CHANNEL_POOL_SIZE
              value: {{ .Values.appServer.env.rabbitmqMaxChannelPoolSize | quote }}
            - name: DB_WRITE_SPAN_BATCH_SIZE
              value: {{ .Values.appServer.env.dbWriteSpanBatchSize | quote }}
            - name: MAX_DB_SPAN_PAYLOAD_BYTES
              value: {{ .Values.appServer.env.maxDbSpanPayloadBytes | quote }}
            - name: REDIS_URL
              value: {{ .Values.appServer.env.redisUrl }}
            - name: ENVIRONMENT
              value: {{ .Values.global.environment }}
            - name: HTTP_PAYLOAD_LIMIT
              value: {{ .Values.appServer.env.httpPayloadLimit | quote }}
            - name: GRPC_PAYLOAD_LIMIT
              value: {{ .Values.appServer.env.grpcPayloadLimit | quote }}
            - name: AGGREGATE_TRACES
              value: {{ .Values.appServer.env.aggregateTraces | quote }}
            - name: ENABLE_TRACING
              value: {{ .Values.appServer.env.enableTracing | quote }}
            - name: QUERY_ENGINE_URL
              value: {{ .Values.appServer.env.queryEngineUrl }}
            - name: QUICKWIT_SEARCH_URL
              value: {{ .Values.appServer.env.quickwitSearchUrl }}
            - name: QUICKWIT_INGEST_URL
              value: {{ .Values.appServer.env.quickwitIngestUrl }}
            # All secrets loaded via envFrom from app-secrets, app-secrets-aws, app-secrets-vault
        - name: nginx
          image: {{ .Values.images.nginx.repository }}:{{ .Values.images.nginx.tag }}
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          resources:
            {{- toYaml .Values.appServer.nginx.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: nginx-config
          configMap:
            name: app-server-nginx-config
            items:
            - key: nginx.conf
              path: nginx.conf
      {{- include "laminar.nodeSelector" (dict "service" .Values.appServer "global" .Values.global) | nindent 6 }}
      {{- include "laminar.affinity" (dict "service" .Values.appServer "global" .Values.global) | nindent 6 }}
      {{- include "laminar.tolerations" (dict "service" .Values.appServer "global" .Values.global) | nindent 6 }}
{{- end }}
