{{- if .Values.queryEngine.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "laminar.resourceName" "query-engine" }}
  labels:
    app: {{ include "laminar.resourceName" "query-engine" }}
spec:
  replicas: {{ .Values.queryEngine.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "laminar.resourceName" "query-engine" }}
  template:
    metadata:
      labels:
        app: {{ include "laminar.resourceName" "query-engine" }}
    spec:
      serviceAccountName: {{ include "lmnr.secrets.serviceAccountName" . }}
      containers:
        - name: query-engine
          image: {{ .Values.images.repository }}/{{ .Values.images.queryEngine.name }}:{{ .Values.images.queryEngine.tag }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          ports:
            - containerPort: 8903
          resources:
            {{- toYaml .Values.queryEngine.resources | nindent 12 }}
      {{- include "laminar.nodeSelector" (dict "service" .Values.queryEngine "global" .Values.global) | nindent 6 }}
      {{- include "laminar.affinity" (dict "service" .Values.queryEngine "global" .Values.global) | nindent 6 }}
      {{- include "laminar.tolerations" (dict "service" .Values.queryEngine "global" .Values.global) | nindent 6 }}
{{- end }}
