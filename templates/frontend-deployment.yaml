{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "laminar.resourceName" "frontend" }}
  labels:
    app: {{ include "laminar.resourceName" "frontend" }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "laminar.resourceName" "frontend" }}
  template:
    metadata:
      labels:
        app: {{ include "laminar.resourceName" "frontend" }}
    spec:
      serviceAccountName: {{ include "lmnr.secrets.serviceAccountName" . }}
      {{- if .Values.frontend.waitForDependencies.enabled }}
      initContainers:
        {{- range .Values.frontend.waitForDependencies.services }}
        - name: wait-for-{{ .name }}
          image: busybox:latest
          command: ['sh', '-c', 'until nc -z {{ .host }} {{ .port }}; do echo "waiting for {{ .name }}..."; sleep 2; done; echo "{{ .name }} is ready"']
        {{- end }}
        {{- range .Values.frontend.waitForDependencies.httpChecks }}
        - name: http-wait-for-{{ .name }}
          image: curlimages/curl:8.5.0
          command: ['sh', '-c', 'until curl -f {{ .url }}; do echo "waiting for {{ .name }}..."; sleep 2; done; echo "{{ .name }} is ready"']
        {{- end }}
      {{- end }}
      containers:
        - name: frontend
          image: {{ .Values.images.repository }}/{{ .Values.images.frontend.name }}:{{ .Values.images.frontend.tag }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          ports:
            - containerPort: 3000
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          envFrom:
            {{- include "lmnr.secrets.envFrom" . | nindent 12 }}
          env:
            - name: BACKEND_URL
              value: {{ .Values.frontend.env.backendUrl }}
            - name: BACKEND_RT_URL
              value: {{ .Values.frontend.env.backendRtUrl }}
            - name: NEXTAUTH_URL
              value: {{ .Values.frontend.env.nextauthUrl }}
            - name: ENVIRONMENT
              value: {{ .Values.global.environment }}
            - name: NEXT_PUBLIC_URL
              value: {{ .Values.frontend.env.nextPublicUrl }}
            - name: REDIS_URL
              value: {{ .Values.frontend.env.redisUrl }}
            - name: QUICKWIT_SEARCH_URL
              value: {{ .Values.frontend.env.quickwitSearchUrl }}
            - name: QUICKWIT_INGEST_URL
              value: {{ .Values.frontend.env.quickwitIngestUrl }}
            # All secrets loaded via envFrom from app-secrets, app-secrets-aws, app-secrets-vault
      {{- include "laminar.nodeSelector" (dict "service" .Values.frontend "global" .Values.global) | nindent 6 }}
      {{- include "laminar.affinity" (dict "service" .Values.frontend "global" .Values.global) | nindent 6 }}
      {{- include "laminar.tolerations" (dict "service" .Values.frontend "global" .Values.global) | nindent 6 }}
{{- end }}
