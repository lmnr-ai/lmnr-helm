{{- if .Values.quickwit.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quickwit-metastore
  labels:
    app.kubernetes.io/name: quickwit
    app.kubernetes.io/instance: quickwit
    app.kubernetes.io/version: {{ .Values.quickwit.version | quote }}
spec:
  replicas: {{ .Values.quickwit.metastore.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: quickwit
      app.kubernetes.io/instance: quickwit
      app.kubernetes.io/component: metastore
  template:
    metadata:
      labels:
        app.kubernetes.io/name: quickwit
        app.kubernetes.io/instance: quickwit
        app.kubernetes.io/component: metastore
    spec:
      serviceAccountName: quickwit
      securityContext:
        fsGroup: 1005
      {{- if .Values.quickwit.metastore.waitForDependencies.enabled }}
      initContainers:
        {{- range .Values.quickwit.metastore.waitForDependencies.services }}
        - name: wait-for-{{ .name }}
          image: busybox:latest
          command: ['sh', '-c', 'until nc -z {{ .host }} {{ .port }}; do echo "waiting for {{ .name }}..."; sleep 2; done; echo "{{ .name }} is ready"']
        {{- end }}
      {{- end }}
      containers:
        - name: quickwit
          securityContext:
            runAsNonRoot: true
            runAsUser: 1005
          image: "quickwit/quickwit:{{ .Values.quickwit.version }}"
          imagePullPolicy: IfNotPresent
          args: ["run", "--service", "metastore"]
          envFrom:
            {{- include "lmnr.secrets.envFrom" . | nindent 12 }}
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: QW_CONFIG
              value: /quickwit/node.yaml
            - name: QW_CLUSTER_ID
              value: {{ .Values.quickwit.clusterId }}
            - name: QW_NODE_ID
              value: "$(POD_NAME)"
            - name: QW_PEER_SEEDS
              value: quickwit-headless
            - name: QW_ADVERTISE_ADDRESS
              value: "$(POD_IP)"
            - name: QW_CLUSTER_ENDPOINT
              value: "http://quickwit-metastore.{{ .Values.quickwit.namespace }}.svc.cluster.local:7280"
            - name: QW_METASTORE_URI
              value: "$(QUICKWIT_DATABASE_URL)"
          ports:
            - name: rest
              containerPort: 7280
              protocol: TCP
            - name: grpc
              containerPort: 7281
              protocol: TCP
            - name: discovery
              containerPort: 7282
              protocol: UDP
          startupProbe:
            failureThreshold: 12
            httpGet:
              path: /health/livez
              port: rest
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/livez
              port: rest
          readinessProbe:
            httpGet:
              path: /health/readyz
              port: rest
          volumeMounts:
            - name: config
              mountPath: /quickwit/node.yaml
              subPath: node.yaml
            - name: data
              mountPath: /quickwit/qwdata
          resources:
            {{- toYaml .Values.quickwit.metastore.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: quickwit
            items:
              - key: node.yaml
                path: node.yaml
        - name: data
          emptyDir: {}
      {{- include "laminar.nodeSelector" (dict "service" .Values.quickwit "global" .Values.global) | nindent 6 }}
      {{- include "laminar.affinity" (dict "service" .Values.quickwit "global" .Values.global) | nindent 6 }}
      {{- include "laminar.tolerations" (dict "service" .Values.quickwit "global" .Values.global) | nindent 6 }}
{{- end }}
