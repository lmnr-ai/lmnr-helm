{{- if .Values.quickwit.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "laminar.resourceName" "quickwit" }}
  labels:
    app.kubernetes.io/name: quickwit
    app.kubernetes.io/instance: quickwit
    app.kubernetes.io/version: {{ .Values.quickwit.version | quote }}
data:
  node.yaml: |-
    data_dir: /quickwit/qwdata
    default_index_root_uri: {{ .Values.quickwit.s3.defaultIndexRootUri }}
    gossip_listen_port: 7282
    listen_address: 0.0.0.0
    storage:
      s3:
        region: {{ .Values.quickwit.s3.region }}
        {{- with .Values.quickwit.s3.flavor }}
        flavor: {{ . }}
        {{- end }}
        {{- with .Values.quickwit.s3.endpoint }}
        endpoint: {{ . | quote }}
        {{- end }}
    metastore_uri: ${QW_METASTORE_URI}
    grpc:
      max_message_size: {{ .Values.quickwit.config.grpcMaxMessageSize | quote }}
    version: 0.8
{{- end }}
