{{- if .Values.quickwit.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "laminar.resourceName" "quickwit-indexer" }}
  labels:
    app.kubernetes.io/name: quickwit
    app.kubernetes.io/instance: quickwit
    app.kubernetes.io/version: {{ .Values.quickwit.version | quote }}
spec:
  replicas: {{ .Values.quickwit.indexer.replicaCount }}
  serviceName: {{ include "laminar.resourceName" "quickwit-headless" }}
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app.kubernetes.io/name: quickwit
      app.kubernetes.io/instance: quickwit
      app.kubernetes.io/component: indexer
  {{- if .Values.quickwit.indexer.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        storageClassName: {{ .Values.quickwit.indexer.persistence.storageClass | default (include "laminar.resourceName" .Values.storage.storageClass.name) }}
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.quickwit.indexer.persistence.size | quote }}
  {{- end }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: quickwit
        app.kubernetes.io/instance: quickwit
        app.kubernetes.io/component: indexer
      annotations:
        # subPath mounts of ConfigMaps are NOT live-updated by the
        # kubelet, so a `helm upgrade` that only edits
        # `quickwit-configmap.yaml` (e.g. raising grpcMaxMessageSize)
        # leaves the running pods on the old node.yaml. The checksum
        # forces a rolling restart whenever the configmap changes.
        checksum/config: {{ include (print $.Template.BasePath "/quickwit-configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "laminar.resourceName" "quickwit" }}
      securityContext:
        fsGroup: 1005
      containers:
        - name: quickwit
          securityContext:
            runAsNonRoot: true
            runAsUser: 1005
          image: "quickwit/quickwit:{{ .Values.quickwit.version }}"
          imagePullPolicy: IfNotPresent
          args: ["run", "--service", "indexer"]
          envFrom:
            {{- include "lmnr.secrets.envFrom" . | nindent 12 }}
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: QW_CONFIG
              value: /quickwit/node.yaml
            - name: QW_CLUSTER_ID
              value: {{ .Values.quickwit.clusterId }}
            - name: QW_NODE_ID
              value: "$(POD_NAME)"
            - name: QW_PEER_SEEDS
              value: {{ include "laminar.resourceName" "quickwit-headless" }}
            - name: QW_ADVERTISE_ADDRESS
              value: "$(POD_IP)"
            - name: QW_CLUSTER_ENDPOINT
              value: "http://{{ include "laminar.resourceName" "quickwit-metastore" }}.{{ include "laminar.namespace" . }}.svc.cluster.local:7280"
            - name: QW_METASTORE_URI
              value: "$(QUICKWIT_DATABASE_URL)"
          ports:
            - name: rest
              containerPort: 7280
              protocol: TCP
            - name: grpc
              containerPort: 7281
              protocol: TCP
            - name: discovery
              containerPort: 7282
              protocol: UDP
          startupProbe:
            httpGet:
              path: /health/livez
              port: rest
            initialDelaySeconds: {{ .Values.quickwit.indexer.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.quickwit.indexer.startupProbe.periodSeconds }}
            failureThreshold: {{ .Values.quickwit.indexer.startupProbe.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /health/livez
              port: rest
          readinessProbe:
            httpGet:
              path: /health/readyz
              port: rest
          volumeMounts:
            - name: config
              mountPath: /quickwit/node.yaml
              subPath: node.yaml
            - name: data
              mountPath: /quickwit/qwdata
          resources:
            {{- toYaml .Values.quickwit.indexer.resources | nindent 12 }}
      terminationGracePeriodSeconds: 120
      volumes:
        - name: config
          configMap:
            name: {{ include "laminar.resourceName" "quickwit" }}
            items:
              - key: node.yaml
                path: node.yaml
        {{- if not .Values.quickwit.indexer.persistence.enabled }}
        - name: data
          emptyDir:
            {{- with .Values.quickwit.indexer.emptyDir.sizeLimit }}
            sizeLimit: {{ . | quote }}
            {{- end }}
        {{- end }}
      {{- include "laminar.nodeSelector" (dict "service" .Values.quickwit "global" .Values.global) | nindent 6 }}
      {{- include "laminar.affinity" (dict "service" .Values.quickwit "global" .Values.global) | nindent 6 }}
      {{- include "laminar.tolerations" (dict "service" .Values.quickwit "global" .Values.global) | nindent 6 }}
{{- end }}
