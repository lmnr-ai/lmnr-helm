{{- $cloudProvider := .Values.global.cloudProvider | default "aws" -}}
{{- $hasHostname := .Values.frontend.ingress.hostname -}}
{{- if and .Values.frontend.enabled .Values.frontend.ingress.enabled (or (eq $cloudProvider "aws") $hasHostname) }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "laminar.resourceName" "frontend-ingress" }}
  annotations:
    {{- if .Values.frontend.ingress.annotations }}
    {{- range $key, $value := .Values.frontend.ingress.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
    {{- else if eq $cloudProvider "aws" }}
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    {{- end }}
    {{- if and $hasHostname .Values.frontend.ingress.externalDns.enabled }}
    external-dns.alpha.kubernetes.io/hostname: {{ $hasHostname }}
    {{- end }}
    {{- if and .Values.frontend.ingress.tls.enabled .Values.frontend.ingress.tls.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.frontend.ingress.tls.clusterIssuer }}
    {{- end }}
spec:
  {{- if .Values.frontend.ingress.className }}
  ingressClassName: {{ .Values.frontend.ingress.className }}
  {{- else if eq $cloudProvider "aws" }}
  ingressClassName: alb
  {{- end }}
  {{- if and $hasHostname .Values.frontend.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ $hasHostname }}
      secretName: {{ .Values.frontend.ingress.tls.secretName }}
  {{- end }}
  rules:
    {{- if $hasHostname }}
    - host: {{ $hasHostname }}
      http:
    {{- else }}
    - http:
    {{- end }}
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "laminar.resourceName" "frontend-service" }}
                port:
                  number: {{ .Values.frontend.service.port }}
{{- end }}
