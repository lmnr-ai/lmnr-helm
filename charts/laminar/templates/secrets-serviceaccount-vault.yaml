{{- if and (include "lmnr.secrets.vaultEnabled" .) .Values.secrets.vault.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.secrets.vault.serviceAccount.name }}
  labels:
    {{- include "laminar.labels" . | nindent 4 }}
  annotations:
    {{- include "laminar.annotations" . | nindent 4 }}
{{- end }}
