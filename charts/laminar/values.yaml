# Global configuration
global:
  # Cloud provider: "aws" or "gcp"
  cloudProvider: "aws"
  environment: "FULL"
  # Namespace for all resources (default: default)
  # When installing the chart, you can specify a custom namespace with --namespace flag
  # If you want a dedicated namespace, use: helm install laminar . --namespace laminar --create-namespace
  namespace: "default"
  # Your node group name. Example: managed-ng-m6a-xlarge-1-80-gb-01
  nodeGroupName: ""
  # Default node scheduling configuration (can be overridden per service)
  nodeSelector: {}
  affinity: {}
  tolerations: []

# Image configuration
images:
  repository: "ghcr.io/lmnr-ai"
  pullPolicy: Always
  frontend:
    name: "frontend"
    tag: "latest"
  appServer:
    name: "app-server"
    tag: "latest"
  queryEngine:
    name: "query-engine"
    tag: "latest"
  redis:
    repository: "valkey/valkey"
    tag: "latest"
  rabbitmq:
    repository: "rabbitmq"
    tag: "latest"
  nginx:
    repository: "nginx"
    tag: "latest"
  postgres:
    repository: "postgres"
    tag: "15"
  clickhouse:
    repository: "clickhouse/clickhouse-server"
    tag: "25.10"

# Secrets configuration (K8s secrets)
secrets:
  enabled: true
  # Database SSL configuration
  # Set to true if connecting to an external Postgres instance that requires SSL
  # Set to false if using the embedded Postgres instance (no SSL)
  enableDatabaseSSL: false

  # AWS Secrets Manager configuration
  # Secrets listed in secretKeys will be fetched from AWS Secrets Manager
  awsSecretsManager:
    enabled: false
    region: "us-east-1"

    # IAM role for IRSA (IAM Roles for Service Accounts)
    serviceAccount:
      create: true
      name: "lmnr-secrets-reader-sa"
      # Optional: If provided, annotates SA with eks.amazonaws.com/role-arn
      # Leave empty if IRSA is already configured
      roleArn: ""

    # Secret source configuration (single JSON secret approach)
    # Option 1: Use clusterName pattern - secret name will be: {clusterName}/lmnr-secrets
    clusterName: ""
    # Option 2: Override with explicit secret name (takes precedence over clusterName)
    secretName: ""

    # Explicit list of secret keys to fetch from AWS
    # These keys will be fetched from AWS and NOT use secrets.data values
    # Example: ["NEXTAUTH_SECRET", "AUTH_GITHUB_ID", "AUTH_GITHUB_SECRET"]
    secretKeys: []

  # HashiCorp Vault configuration
  # Secrets listed in secretKeys will be fetched from Vault
  vault:
    enabled: false
    address: "http://vault:8200"

    # Kubernetes auth configuration
    authPath: "auth/kubernetes"
    role: "lmnr-app"

    # Service account for Vault authentication
    serviceAccount:
      create: true
      name: "lmnr-vault-sa"

    # Secret path configuration
    kvVersion: "v2" # v1 or v2
    secretPath: "secret/data/lmnr" # Path to secrets in Vault (for KV v2)

    # Explicit list of secret keys to fetch from Vault
    # These keys will be fetched from Vault and NOT use secrets.data values
    # Example: ["RABBITMQ_PASSWORD", "CLICKHOUSE_PASSWORD", "POSTGRES_PASSWORD"]
    secretKeys: []

  # Full schema of all required secrets
  # Keys NOT listed in AWS or Vault secretKeys will use these values as defaults
  # Auto-generated URLs (DATABASE_URL, CLICKHOUSE_URL, RABBITMQ_URL) are created
  # unless the key is present in AWS or Vault secretKeys
  # All secret values should be provided via values files or --set flags
  data:
    NEXTAUTH_SECRET: "abc"
    RABBITMQ_ERLANG_COOKIE: "rabbitmq-erlang-cookie"
    RABBITMQ_DEFAULT_USER: "admin"
    RABBITMQ_DEFAULT_PASS: "rabbitmq123"
    CLICKHOUSE_USER: "default"
    CLICKHOUSE_PASSWORD: "clickhouse123"
    POSTGRES_USER: "lmnr"
    POSTGRES_PASSWORD: "lmnr123"
    AEAD_SECRET_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
    SHARED_SECRET_TOKEN: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
    AWS_ACCESS_KEY_ID: ""
    AWS_SECRET_ACCESS_KEY: ""
    AWS_REGION: "us-east-1"
    S3_EXPORTS_BUCKET: "<s3-exports-bucket-name>"
    GOOGLE_GENERATIVE_AI_API_KEY: ""
    # App Server secrets
    CLICKHOUSE_RO_USER: "default"
    CLICKHOUSE_RO_PASSWORD: "clickhouse123"
    DATABASE_SSL_ROOT_CERT: "<DATABASE_SSL_ROOT_CERT--MULTILINE_PEM_ENCODED>"
    # App Server Consumer secrets
    SLACK_ENCRYPTION_KEY: ""
    CLUSTER_ENDPOINT: ""
    CLUSTER_ENDPOINT_KEY: ""
    # Frontend secrets - Auth providers
    ## github
    AUTH_GITHUB_ID: ""
    AUTH_GITHUB_SECRET: ""
    ## google
    AUTH_GOOGLE_ID: ""
    AUTH_GOOGLE_SECRET: ""
    ## azure
    AUTH_AZURE_AD_CLIENT_ID: ""
    AUTH_AZURE_AD_CLIENT_SECRET: ""
    AUTH_AZURE_AD_TENANT_ID: ""
    ## okta
    AUTH_OKTA_CLIENT_ID: ""
    AUTH_OKTA_CLIENT_SECRET: ""
    AUTH_OKTA_ISSUER: ""
    ## keycloak
    AUTH_KEYCLOAK_ID: ""
    AUTH_KEYCLOAK_SECRET: ""
    AUTH_KEYCLOAK_ISSUER: ""
    # Frontend secrets - Integrations
    STRIPE_SECRET_KEY: ""
    STRIPE_WEBHOOK_ENDPOINT_SECRET: ""
    RESEND_API_KEY: ""
    GITHUB_TOKEN: ""
    LMNR_PROJECT_API_KEY: ""
    # Frontend secrets - Worker URLs
    DATASET_EXPORT_WORKER_URL: ""
    DATASET_EXPORT_SECRET_KEY: ""
    DATA_EXPORTER_URL: ""
    DATA_EXPORTER_SECRET_KEY: ""
    # Frontend secrets - Slack
    SLACK_CLIENT_ID: ""
    SLACK_CLIENT_SECRET: ""
    SLACK_SIGNING_SECRET: ""
    SLACK_REDIRECT_URL: ""
    # Frontend secrets - Other
    OPENAI_API_KEY: ""
    # Quickwit secrets
    QUICKWIT_DATABASE_URL: "postgres://lmnr:lmnr123@laminar-postgres-service:5432/postgres"

# Frontend configuration
frontend:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: "0.1"
      memory: "1Gi"
    limits:
      cpu: "2.0"
      memory: "2Gi"
  # Node scheduling configuration
  nodeSelector: {}
  affinity: {}
  tolerations: []
  # Wait for dependencies before starting
  waitForDependencies:
    enabled: true
    services:
      - name: redis
        host: laminar-redis-service
        port: 6379
      - name: postgres
        host: laminar-postgres-service
        port: 5432
      - name: clickhouse
        host: laminar-clickhouse-service
        port: 8123
    httpChecks:
      - name: app-server
        url: http://laminar-app-server-service:8000/health
      - name: app-server-consumer
        url: http://laminar-app-server-consumer-service:8000/health
  service:
    type: ClusterIP
    port: 80
    targetPort: 3000
  ingress:
    enabled: true
    # If left empty, will be set based on global.cloudProvider (aws -> alb, gcp -> gce)
    className: ""
    # Optional: Set a custom hostname for your ingress
    # If set, this will be used in the ingress rules and can be used with external-dns
    # Example: "app.yourdomain.com"
    hostname: ""
    # Optional: Enable external-dns integration
    # Requires external-dns to be installed in your cluster
    # When enabled with a hostname, external-dns will automatically create DNS records
    externalDns:
      enabled: false
    # Optional: TLS configuration via cert-manager
    # Requires cert-manager to be installed in your cluster
    tls:
      enabled: false
      secretName: "laminar-frontend-tls"
      clusterIssuer: "letsencrypt"
    # Annotations for the ingress. If empty, defaults for global.cloudProvider will be used.
    annotations: {}
      # For AWS (ALB):
      # alb.ingress.kubernetes.io/scheme: internet-facing
      # alb.ingress.kubernetes.io/target-type: ip
      # alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
      # For GCP (GCE):
      # kubernetes.io/ingress.allow-http: "true"
  env:
    backendUrl: "http://laminar-app-server-service:8000"
    backendRtUrl: "http://laminar-app-server-consumer-service:8000"
    # Set these to your actual frontend URL
    # If ingress.hostname is set, you can use "http://<hostname>" or "https://<hostname>"
    # Otherwise, set the ALB DNS name after initial deployment (see QUICKSTART.md)
    nextauthUrl: "https://localhost:3000"
    nextPublicUrl: "https://localhost:3000"
    redisUrl: "redis://laminar-redis-service:6379"
    quickwitSearchUrl: "http://laminar-quickwit-searcher:7280"
    bedrockEnabled: "false"
  # First launch runs all migrations to prepare databases, which can take several minutes.
  # Larger initial delays are set to account for this.
  readinessProbe:
    initialDelaySeconds: 150
    periodSeconds: 10
  livenessProbe:
    initialDelaySeconds: 150
    periodSeconds: 20
  # Additional environment variables for the frontend container.
  # Supports all Kubernetes env var formats including valueFrom.secretKeyRef
  # to reference pre-existing Kubernetes secrets.
  # These take precedence over values injected via envFrom (secrets.data).
  # Example - read from an existing K8s secret:
  #   extraEnv:
  #     - name: AUTH_KEYCLOAK_ID
  #       valueFrom:
  #         secretKeyRef:
  #           name: keycloak-realm
  #           key: client-id
  #     - name: AUTH_KEYCLOAK_ISSUER
  #       value: "https://keycloak.example.com/realms/my-realm"
  extraEnv: []

# App Server configuration
appServer:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: "0.5"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "2Gi"
  # Node scheduling configuration
  nodeSelector: {}
  affinity: {}
  tolerations: []
  # Wait for dependencies before starting
  waitForDependencies:
    enabled: true
    services:
      - name: redis
        host: laminar-redis-service
        port: 6379
      - name: postgres
        host: laminar-postgres-service
        port: 5432
      - name: clickhouse
        host: laminar-clickhouse-service
        port: 8123
      - name: rabbitmq
        host: laminar-rabbitmq-service
        port: 5672
  service:
    type: ClusterIP
    port: 8000
    targetPort: 8000
  loadBalancer:
    enabled: true
    # Optional: hostname for external-dns to create a DNS record pointing to this LoadBalancer.
    # When set, external-dns will manage the DNS record automatically.
    # Example: "api.yourdomain.com"
    hostname: ""
    # Annotations for the load balancer. If empty, defaults for global.cloudProvider will be used.
    annotations: {}
      # For AWS (NLB):
      # service.beta.kubernetes.io/aws-load-balancer-type: external
      # service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: instance
      # service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
      # service.beta.kubernetes.io/aws-load-balancer-backend-protocol: http
  # Optional: Ingress for the app server (L7 HTTP routing with external-dns and cert-manager TLS)
  # AWS users: you most likely do NOT need this — loadBalancer above already exposes
  # the app server externally via NLB. Use this only for GCP or if you prefer ALB over NLB.
  ingress:
    # Optional: Set a custom hostname to enable the ingress
    hostname: ""
    # ingressClassName is required when hostname is set (e.g. "traefik", "gce", "alb")
    className: ""
    # Optional: Enable external-dns integration
    externalDns:
      enabled: false
    # Optional: TLS configuration via cert-manager
    # Requires cert-manager to be installed in your cluster
    tls:
      enabled: false
      secretName: "laminar-app-server-tls"
      clusterIssuer: "letsencrypt"
    # Additional annotations for the ingress
    annotations: {}
  nginx:
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "300m"
        memory: "256Mi"
  env:
    port: "8000"
    agentManagerUrl: "http://laminar-agent-manager-service:8901"
    grpcPort: "8001"
    databaseMaxConnections: "64"
    rabbitmqMaxChannelPoolSize: "128"
    dbWriteSpanBatchSize: "24"
    maxDbSpanPayloadBytes: "262144"
    httpPayloadLimit: "26214400"
    grpcPayloadLimit: "26214400"
    aggregateTraces: "true"
    enableTracing: "true"
    queryEngineUrl: "http://laminar-query-engine-service:8903"
    quickwitSearchUrl: "http://laminar-quickwit-searcher:7280"
    quickwitIngestUrl: "http://laminar-quickwit-indexer:7281"
    redisUrl: "redis://laminar-redis-service:6379"
  # Additional environment variables for the app-server container.
  # Supports all Kubernetes env var formats including valueFrom.secretKeyRef.
  # These take precedence over values injected via envFrom (secrets.data).
  extraEnv: []

# App Server Consumer configuration
appServerConsumer:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: "100m"
      memory: "0.5Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
  # Node scheduling configuration
  nodeSelector: {}
  affinity: {}
  tolerations: []
  # Wait for dependencies before starting
  waitForDependencies:
    enabled: true
    services:
      - name: redis
        host: laminar-redis-service
        port: 6379
      - name: postgres
        host: laminar-postgres-service
        port: 5432
      - name: clickhouse
        host: laminar-clickhouse-service
        port: 8123
      - name: rabbitmq
        host: laminar-rabbitmq-service
        port: 5672
  service:
    type: ClusterIP
    port: 8000
    targetPort: 8000
  env:
    port: "8000"
    consumerPort: "8000"
    databaseMaxConnections: "64"
    numSpansWorkers: "8"
    numSpansIndexerWorkers: "8"
    numBrowserEventsWorkers: "8"
    numNotificationWorkers: "4"
    numClusteringWorkers: "8"
    numSemanticEventWorkers: "1"
    numSignalJobSubmissionBatchWorkers: "8"
    numSignalJobPendingBatchWorkers: "8"
    signalJobPendingBatchSize: "64"
    signalJobMaxAllowedSteps: "10"
    signalJobWaitingQueueTtlMs: "300000"
    numSignalJobRealtimeWorkers: "4"
    numReportsWorkers: "2"
    spansIndexerQueuePrefetchCount: "1"
    rabbitmqMaxChannelPoolSize: "128"
    signalsLlmProvider: "gemini"
    # override to set to a custom value otherwise defaults to smaller models
    signalsLlmModel: ""
    # if the provider supports batch API, we prefer that. Can be overriden
    # globally by this control
    signalsAlwaysUseRealtime: "false"
    redisUrl: "redis://laminar-redis-service:6379"
    enableTracing: "false"
    enableReports: "false"
    quickwitSearchUrl: "http://laminar-quickwit-searcher:7280"
    quickwitIngestUrl: "http://laminar-quickwit-indexer:7281"
  # Additional environment variables for the app-server-consumer container.
  # Supports all Kubernetes env var formats including valueFrom.secretKeyRef.
  # These take precedence over values injected via envFrom (secrets.data).
  extraEnv: []

# Quickwit configuration
quickwit:
  enabled: true
  version: "v0.8.2"
  clusterId: "default-quickwit"
  # Node scheduling configuration
  nodeSelector: {}
  affinity: {}
  tolerations: []
  # S3 storage configuration
  s3:
    defaultIndexRootUri: "s3://lmnr-quickwit/indexes"
    region: "us-east-1"
  # Quickwit node.yaml settings
  config:
    # Increase from Quickwit's 4 MiB default — app-server-consumer can
    # send large span batches to the indexer, and the searcher returns
    # large result sets to app-server. Hitting the default cap surfaces
    # as opaque gRPC errors.
    grpcMaxMessageSize: "50 MiB"
  # Component configurations
  controlPlane:
    replicaCount: 1
    resources:
      requests:
        cpu: "0.1"
        memory: "100Mi"
      limits:
        cpu: "1.0"
        memory: "1Gi"
  janitor:
    replicaCount: 1
    resources:
      requests:
        cpu: "0.1"
        memory: "100Mi"
      limits:
        cpu: "1.0"
        memory: "1Gi"
  metastore:
    replicaCount: 1
    resources:
      requests:
        cpu: "0.1"
        memory: "100Mi"
      limits:
        cpu: "1.0"
        memory: "1Gi"
    waitForDependencies:
      enabled: true
      services:
        - name: postgres
          host: laminar-postgres-service
          port: 5432
  indexer:
    replicaCount: 1
    resources:
      # Requests bumped from 0.1cpu/100Mi: under realistic ingest the
      # indexer needs at least ~1Gi resident, and scheduling it onto a
      # node that can't supply that is what surfaces as OOMKilled on
      # startup with a backlog. Limits unchanged — operators with heavy
      # ingest should raise `limits.memory` to 8Gi+.
      requests:
        cpu: "0.5"
        memory: "1Gi"
      limits:
        cpu: "1.0"
        memory: "4Gi"
    # Startup probe budget. Quickwit can take a while to come up on a
    # non-empty index because it enumerates splits from S3. The old
    # hardcoded budget (12 × 5s = 60s) is tight and produced misleading
    # "connection refused" events when the real failure was an OOM kill
    # later in startup. ~165s gives genuine startups room to finish.
    startupProbe:
      initialDelaySeconds: 15
      periodSeconds: 5
      failureThreshold: 30
    # Indexer working data (incoming docs being built into splits, merge
    # scratch space, local split cache). Final splits live in S3
    # regardless of this setting.
    #
    # Default (persistence.enabled=false) uses an emptyDir capped by
    # `emptyDir.sizeLimit`. The cap means a runaway working set fails
    # the indexer pod instead of evicting every other pod on the node
    # via kubelet ephemeral-storage pressure.
    #
    # RECOMMENDED FOR PRODUCTION: set `persistence.enabled=true` to
    # back qwdata with a PVC. This (a) keeps the indexer's working set
    # off node ephemeral storage entirely, and (b) avoids re-fetching
    # split state from S3 on every restart.
    #
    # Upgrade note: switching an existing install from emptyDir to PVC
    # requires recreating the StatefulSet because
    # `spec.volumeClaimTemplates` is immutable:
    #   kubectl delete sts laminar-quickwit-indexer --cascade=orphan
    #   helm upgrade -i laminar ./charts/laminar -f laminar.yaml
    # The new pod re-fetches working state from S3 on startup.
    persistence:
      enabled: false
      storageClass: ""
      size: "20Gi"
    emptyDir:
      sizeLimit: "20Gi"
  searcher:
    replicaCount: 1
    resources:
      requests:
        cpu: "0.1"
        memory: "100Mi"
      limits:
        cpu: "1.0"
        memory: "2Gi"
    startupProbe:
      initialDelaySeconds: 15
      periodSeconds: 5
      failureThreshold: 30
    # Searcher's qwdata is mostly a local hot cache of splits pulled
    # from S3 for the active query workload. Same trade-off as the
    # indexer: emptyDir is fine for most installs, but if you have a
    # large index or slow S3 round-trips, a PVC keeps the cache warm
    # across restarts.
    persistence:
      enabled: false
      storageClass: ""
      size: "10Gi"
    emptyDir:
      sizeLimit: "10Gi"

# Query Engine configuration
queryEngine:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: "0.1"
      memory: "128Mi"
    limits:
      cpu: "0.5"
      memory: "256Mi"
  # Node scheduling configuration
  nodeSelector: {}
  affinity: {}
  tolerations: []
  service:
    type: ClusterIP
    port: 8903
    targetPort: 8903

# PostgreSQL configuration
postgres:
  enabled: true
  replicaCount: 1
  database: "lmnr"
  resources:
    requests:
      cpu: "0.1"
      memory: "128Mi"
    limits:
      cpu: "0.5"
      memory: "2Gi"
  # Node scheduling configuration
  nodeSelector: {}
  affinity: {}
  tolerations: []
  persistence:
    enabled: true
    # Storage class name - if empty, uses default storage class
    storageClass: ""
    size: "20Gi"
  service:
    type: ClusterIP
    port: 5432
    targetPort: 5432

# ClickHouse configuration
clickhouse:
  enabled: true
  replicaCount: 1
  database: "lmnr"
  resources:
    requests:
      cpu: "0.1"
      memory: "256Mi"
    limits:
      cpu: "0.5"
      memory: "4Gi"
  # Node scheduling configuration
  nodeSelector: {}
  affinity: {}
  tolerations: []
  persistence:
    enabled: true
    # Storage class name - if empty, uses default storage class
    storageClass: ""
    size: "50Gi"
  # S3 storage configuration for separation of storage and compute
  # When enabled, ClickHouse will store data in S3 instead of local disks
  s3:
    enabled: true
    # S3 bucket endpoint (e.g., https://my-bucket.s3.us-east-1.amazonaws.com/)
    # For GCS, use https://storage.googleapis.com/my-bucket
    endpoint: ""
    # S3 bucket region. AWS only
    region: ""
    # S3 access credentials - set directly or via environment variables from a Kubernetes secret
    # For GCP, these are Service account HMAC key and Service account HMAC secret respectively
    accessKeyId: ""
    secretAccessKey: ""
    # Load accessKeyId/secretAccessKey from environment variable names (e.g. from extraEnv).
    # Takes precedence over accessKeyId/secretAccessKey when set.
    accessKeyIdFrom: ""
    secretAccessKeyFrom: ""
    # Use environment credentials or EC2 instance profile
    useEnvironmentCredentials: false
    # Local cache configuration for S3 data
    cache:
      enabled: true
      # Local disk path for cache
      path: "/var/lib/clickhouse/disks/s3_cache/"
      # Maximum cache size (e.g., 10Gi, 50Gi)
      maxSize: "10Gi"
    # Metadata path for S3 disk
    metadataPath: "/var/lib/clickhouse/disks/s3_disk/"
  # Extra environment variables to inject into the ClickHouse container.
  # Useful for loading S3 credentials from Kubernetes secrets via secretKeyRef.
  extraEnv: []
  # - name: GCS_HMAC_KEY
  #   valueFrom:
  #     secretKeyRef:
  #       name: clickhouse-gcs-credentials
  #       key: access-key-id
  # - name: GCS_HMAC_SECRET
  #   valueFrom:
  #     secretKeyRef:
  #       name: clickhouse-gcs-credentials
  #       key: secret-access-key
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3
  livenessProbe:
    initialDelaySeconds: 120
    periodSeconds: 30
    failureThreshold: 5
  service:
    type: ClusterIP
    port: 8123
    targetPort: 8123
    nativePort: 9000

# Redis configuration
redis:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: "0.1"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "1Gi"
  # Node scheduling configuration
  nodeSelector: {}
  affinity: {}
  tolerations: []
  service:
    type: ClusterIP
    port: 6379
    targetPort: 6379

# RabbitMQ configuration
rabbitmq:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: "0.1"
      memory: "256Mi"
    limits:
      cpu: "1.0"
      memory: "4Gi"
  # Node scheduling configuration
  nodeSelector: {}
  affinity: {}
  tolerations: []
  persistence:
    enabled: true
    # Storage class name - if empty, uses default storage class
    storageClass: ""
    # Default sized for moderate trace volume. RabbitMQ persists durable
    # messages to its WAL on disk; if a downstream consumer (e.g. the
    # Quickwit indexer) stalls, the backlog grows here. See README for
    # sizing guidance against your expected ingest rate.
    size: "100Gi"
  service:
    type: ClusterIP
    amqpPort: 5672
  headlessService:
    enabled: true
  config:
    maxMessageSize: 78643200
    # Self-protection limits. Without these, RabbitMQ will crash on
    # ENOSPC instead of blocking publishers when the disk is nearly full.
    # `diskFreeLimit` is the absolute amount of free disk RabbitMQ tries
    # to keep available; when free space drops below this, publishers are
    # blocked (flow-control).
    diskFreeLimit: "2GB"
    # `vmMemoryHighWatermark` is the absolute memory threshold at which
    # RabbitMQ starts paging/flow-controlling. Keep this comfortably
    # below `rabbitmq.resources.limits.memory` so the kernel does not
    # OOM-kill the container before RabbitMQ self-protects.
    vmMemoryHighWatermark: "2GB"
    # Console log level. RabbitMQ also writes to a file inside the
    # container, but that disappears on SIGKILL — keep console logging
    # on so `kubectl logs` shows the failure.
    logLevel: "info"

# Storage configuration
storage:
  storageClass:
    # Name of the storage class created by this chart
    name: "laminar-sc"
    # If left empty, will be set based on global.cloudProvider:
    #   - aws: ebs.csi.aws.com
    #   - gcp: pd.csi.storage.gke.io
    provisioner: ""
    # If left empty, will be set based on global.cloudProvider:
    #   - aws: gp3
    #   - gcp: pd-balanced
    type: ""
    reclaimPolicy: "Retain" # Retain volumes after pod deletion
    volumeBindingMode: "WaitForFirstConsumer" # Bind volumes when pod is scheduled
    # Allow PVCs created against this class to be resized in place.
    # Disable only if you have a managed-StorageClass policy that
    # forbids expansion.
    allowVolumeExpansion: true
    # Availability zones where volumes can be created. Required for AWS EBS.
    # On GKE, you can often leave this empty to use default regional/zonal placement.
    # Important: Ensure your nodes are running in these zones.
    zones: []
