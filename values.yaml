# Global configuration
global:
  environment: "FULL"
  nodeGroupName: "t3a-xlarge"

# Image configuration
images:
  repository: "ghcr.io/lmnr-ai"
  pullPolicy: Always
  frontend:
    name: "frontend"
    tag: "latest"
  appServer:
    name: "app-server"
    tag: "latest"
  queryEngine:
    name: "query-engine"
    tag: "latest"
  redis:
    repository: "valkey/valkey"
    tag: "latest"
  rabbitmq:
    repository: "rabbitmq"
    tag: "latest"
  nginx:
    repository: "nginx"
    tag: "latest"
  postgres:
    repository: "postgres"
    tag: "15"
  clickhouse:
    repository: "clickhouse/clickhouse-server"
    tag: "latest"

# Secrets configuration (K8s secrets)
secrets:
  enabled: true
  # All secret values - these should be provided via values files or --set flags
  data:
    NEXTAUTH_SECRET: "abc"
    RABBITMQ_ERLANG_COOKIE: "rabbitmq-erlang-cookie"
    RABBITMQ_DEFAULT_USER: "admin"
    RABBITMQ_DEFAULT_PASS: "rabbitmq123"
    CLICKHOUSE_USER: "default"
    CLICKHOUSE_PASSWORD: "clickhouse123"
    POSTGRES_USER: "lmnr"
    POSTGRES_PASSWORD: "lmnr123"
    AEAD_SECRET_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
    SHARED_SECRET_TOKEN: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
    AWS_ACCESS_KEY_ID: "<AWS_ACCESS_KEY_ID>"
    AWS_SECRET_ACCESS_KEY: "<AWS_SECRET_ACCESS_KEY>"
    AWS_REGION: "us-east-1"
    S3_TRACE_PAYLOADS_BUCKET: "<s3-bucket-name>"
    S3_EXPORTS_BUCKET: "<s3-exports-bucket-name>"
    # App Server secrets
    PYTHON_ONLINE_EVALUATOR_URL: "<PYTHON_ONLINE_EVALUATOR_URL>"
    CLICKHOUSE_RO_USER: "default"
    CLICKHOUSE_RO_PASSWORD: "<CLICKHOUSE_RO_PASSWORD>"
    DATABASE_SSL_ROOT_CERT: ""
    # App Server Consumer secrets
    TRACE_SUMMARIZER_SECRET_KEY: "<TRACE_SUMMARIZER_SECRET_KEY>"
    TRACE_SUMMARIZER_URL: "<TRACE_SUMMARIZER_URL>"
    TRACE_EVENT_IDENTIFIER_URL: "<TRACE_EVENT_IDENTIFIER_URL>"
    SLACK_ENCRYPTION_KEY: "<SLACK_ENCRYPTION_KEY>"
    CLUSTER_ENDPOINT: "<CLUSTER_ENDPOINT>"
    CLUSTER_ENDPOINT_KEY: "<CLUSTER_ENDPOINT_KEY>"
    ONLINE_EVALUATORS_SECRET_KEY: "<ONLINE_EVALUATORS_SECRET_KEY>"
    # Frontend secrets - Auth providers
    AUTH_GITHUB_ID: "<AUTH_GITHUB_ID>"
    AUTH_GITHUB_SECRET: "<AUTH_GITHUB_SECRET>"
    AUTH_GOOGLE_ID: "<AUTH_GOOGLE_ID>"
    AUTH_GOOGLE_SECRET: "<AUTH_GOOGLE_SECRET>"
    AUTH_AZURE_AD_CLIENT_ID: "<AUTH_AZURE_AD_CLIENT_ID>"
    AUTH_AZURE_AD_CLIENT_SECRET: "<AUTH_AZURE_AD_CLIENT_SECRET>"
    AUTH_AZURE_AD_TENANT_ID: "<AUTH_AZURE_AD_TENANT_ID>"
    # Frontend secrets - Integrations
    STRIPE_SECRET_KEY: "<STRIPE_SECRET_KEY>"
    STRIPE_WEBHOOK_ENDPOINT_SECRET: "<STRIPE_WEBHOOK_ENDPOINT_SECRET>"
    RESEND_API_KEY: "<RESEND_API_KEY>"
    GITHUB_TOKEN: "<GITHUB_TOKEN>"
    LAMINAR_API_KEY: "<LAMINAR_API_KEY>"
    SUPABASE_JWT_SECRET: "<SUPABASE_JWT_SECRET>"
    # Frontend secrets - Worker URLs
    DATASET_EXPORT_WORKER_URL: "<DATASET_EXPORT_WORKER_URL>"
    DATASET_EXPORT_SECRET_KEY: "<DATASET_EXPORT_SECRET_KEY>"
    DATA_EXPORTER_URL: "<DATA_EXPORTER_URL>"
    DATA_EXPORTER_SECRET_KEY: "<DATA_EXPORTER_SECRET_KEY>"
    # Frontend secrets - Slack
    SLACK_CLIENT_ID: "<SLACK_CLIENT_ID>"
    SLACK_CLIENT_SECRET: "<SLACK_CLIENT_SECRET>"
    SLACK_SIGNING_SECRET: "<SLACK_SIGNING_SECRET>"
    SLACK_REDIRECT_URL: "<SLACK_REDIRECT_URL>"
    # Frontend secrets - Other
    OPENAI_API_KEY: "<OPENAI_API_KEY>"
    GOOGLE_GENERATIVE_AI_API_KEY: "<GOOGLE_GENERATIVE_AI_API_KEY>"
    LMNR_PROJECT_API_KEY: "<LMNR_PROJECT_API_KEY>"

# Frontend configuration
frontend:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: "0.1"
      memory: "1Gi"
    limits:
      cpu: "2.0"
      memory: "4Gi"
  service:
    type: ClusterIP
    port: 80
    targetPort: 3000
  ingress:
    enabled: true
    className: "alb"
    annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
  env:
    backendUrl: "http://app-server-service:8000"
    backendRtUrl: "http://app-server-consumer-service:8000"
    nextauthUrl: "<YOUR_NEXT_SERVER_URL>"
    nextPublicUrl: "<YOUR_NEXT_PUBLIC_URL>"
    redisUrl: "redis://redis-service:6379"

# App Server configuration
appServer:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: "0.5"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "8Gi"
  service:
    type: ClusterIP
    port: 8000
    targetPort: 8000
  loadBalancer:
    enabled: true
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: external
      service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: instance
      service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
      service.beta.kubernetes.io/aws-load-balancer-backend-protocol: http
  nginx:
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "300m"
        memory: "256Mi"
  env:
    port: "8000"
    agentManagerUrl: "http://agent-manager-service:8901"
    grpcPort: "8001"
    databaseMaxConnections: "64"
    rabbitmqMaxChannelPoolSize: "128"
    dbWriteSpanBatchSize: "24"
    maxDbSpanPayloadBytes: "262144"
    httpPayloadLimit: "26214400"
    grpcPayloadLimit: "26214400"
    aggregateTraces: "true"
    enableTracing: "true"
    queryEngineUrl: "http://query-engine-service:8903"
    redisUrl: "redis://redis-service:6379"

# App Server Consumer configuration
appServerConsumer:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: "0.5"
      memory: "0.5Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
  service:
    type: ClusterIP
    port: 8000
    targetPort: 8000
  env:
    port: "8000"
    consumerPort: "8000"
    databaseMaxConnections: "64"
    numSpansWorkers: "48"
    numBrowserEventsWorkers: "48"
    numPayloadWorkers: "48"
    numTraceSummaryWorkers: "16"
    numEvaluatorsWorkers: "8"
    numNotificationWorkers: "4"
    numClusteringWorkers: "4"
    rabbitmqMaxChannelPoolSize: "128"
    redisUrl: "redis://redis-service:6379"
    aggregateTraces: "true"
    enableTracing: "true"

# Query Engine configuration
queryEngine:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: "0.1"
      memory: "128Mi"
    limits:
      cpu: "0.5"
      memory: "256Mi"
  service:
    type: ClusterIP
    port: 8903
    targetPort: 8903

# PostgreSQL configuration
postgres:
  enabled: true
  replicaCount: 1
  database: "lmnr"
  resources:
    requests:
      cpu: "0.5"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
  persistence:
    enabled: true
    storageClass: "ebs-sc"
    size: "20Gi"
  service:
    type: ClusterIP
    port: 5432
    targetPort: 5432

# ClickHouse configuration
clickhouse:
  enabled: true
  replicaCount: 1
  database: "lmnr"
  resources:
    requests:
      cpu: "0.5"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
  persistence:
    enabled: true
    storageClass: "ebs-sc"
    size: "50Gi"
  service:
    type: ClusterIP
    port: 8123
    targetPort: 8123
    nativePort: 9000

# Redis configuration
redis:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: "0.1"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "1Gi"
  service:
    type: ClusterIP
    port: 6379
    targetPort: 6379

# RabbitMQ configuration
rabbitmq:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: "0.5"
      memory: "1Gi"
    limits:
      cpu: "4"
      memory: "4Gi"
  persistence:
    enabled: true
    storageClass: "ebs-sc"
    size: "5Gi"
  service:
    type: ClusterIP
    amqpPort: 5672
  headlessService:
    enabled: true
  config:
    maxMessageSize: 78643200

# Storage configuration
storage:
  storageClass:
    name: "ebs-sc"
    provisioner: "kubernetes.io/aws-ebs"
    type: "gp3"
    reclaimPolicy: "Retain"
    volumeBindingMode: "WaitForFirstConsumer"
    zones:
      - "us-east-1b"
      - "us-east-1f" 